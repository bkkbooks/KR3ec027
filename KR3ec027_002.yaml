body:
  text: 第二卷形體用藥及專科用藥頭面七竅一巔頂頭面用藥天麻味辛性平無毒入肝經酒浸煨熟焙乾風虛眩暈麻痹不仁語言蹇謇澀腰膝軟疼理風癇驚氣治恍惚失神肝為風木之臟藏血主筋獨入肝經故主治如上天麻雖不甚燥畢竟是風劑助火若血虛無風者不可妄投白蒺藜又名刺蒺藜味苦辛性平無毒入肺肝二經去刺用孕婦不宜服祛風而皮膚搔癢可止平肝而眼目翳膜能除頭疼眩暈堪定鼻鼽噴嚏無虞刺蒺藜主治肝肺沙苑蒺藜主治在腎刺者多治上部外部沙苑者多治下部內部是其區別芎藭味辛性溫無毒入肝經白芷為使畏黃連主頭痛面風淚出多涕寒痹筋攣去瘀生新調經種子長肉排膿小者名撫芎止利且開鬱辛甘發散為陽故多功於頭面血和則去舊生新經調而攣痹自解長肉排膿者以其為血中氣藥也撫芎之止利開鬱亦上升辛散之力芎藭性陽味辛凡虛火上炎嘔吐咳逆者忌之衍義云久服令人暴亡為其辛喜歸肺肺氣偏勝金來賊木肝必受侮久則偏絶耳茺蔚子味辛性微寒無毒入心胞肝二經忌鐵活血養肝益精調經頭痛眩暈目赤缺明此子宜於血滯之目病如瞳子散大者忌用頭痛眩暈而兼血滯之象者用之更宜又能除水氣益心氣藁本味辛性溫無毒入膀胱經惡䕡茹風家巔頂作痛女人陰腫疝疼辛溫純陽獨入太陽理風寒疝瘕陰痛皆太陽經寒濕為邪也頭痛挾內熱者及傷寒發於春夏陽證頭痛不宜進也蔓荊子味苦辛性平無毒入肝膀胱二經惡烏頭石膏頭風連於眼目搜散無餘濕痹甚而拘攣展舒有效氣清味辛體輕而浮上行而散故所主者皆在風木之臟目之與筋皆肝所主也頭痛目痛不因風邪而因於血虛有火者忌之元素云胃虛人不可服恐生痰疾夏枯草味苦辛性寒無毒入肝經土瓜為使辛能散結苦能泄熱清肝火防薄厥陽浮於上眩暈欲跌目痛羞明鼠瘻瘰癘夏枯草久用亦傷胃家荷葉味微苦性平無毒入肝脾胃三經清熱解暑升發清陽助胃消食蓋粥芳香治頭暈與頭脹發痘瘡以成漿散宿血而止吐衄止瀉痢而澀滑腸巔頂昏蒙如墮雲霧與茶同用開暢清涼荷蒂可治雷頭風荷梗去刺用能通氣寬胸夏受暑濕胸悶不暢用為藥引荷之全部均能治病今將藕藕節藕皮蓮子蓮心蓮花瓣蓮花須蓮房等分立專條供互相參考桑椹子味甘酸性偏溫入肝腎二經補肝益腎養血生津頭旋心悸目眩耳鳴鬚髮早白便祕難行此子能潤滑大腸故大便稀者勿用十大功勞葉原名枸骨味苦性涼入肝腎二經腰腳痿弱令健陽浮於上使平額沉頭暈目眩耳鳴此物益腎平肝用於調理上盛下虛之症有益二鼻科用藥辛夷味辛性溫無毒入肝胃二經芎藭為使惡五石脂畏菖蒲蒲黃黃連石膏去心及毛毛射肺中令人發咳辛溫開竅鼻塞與昏冒咸宜清陽解肌壯熱與憎寒並選肺開竅於鼻而胃脈環鼻上行凡中氣不足清陽不升則頭痛而九竅不利辛夷稟陽春之氣味薄而散能助胃中清氣上達高巔故頭面諸竅皆歸於治平也辛香走竄虛人禁之雖偶感風寒而鼻塞者亦禁之頭痛屬血虛火熾者服之轉甚白芷味辛性溫無毒入脾胃大腸三經當歸為使惡旋覆花微焙通鼻塞祛濁涕頭風目淚齒痛眉疼肌膚搔癢嘔吐不寧女人赤白帶下瘡家止痛排膿色白味辛行手陽明庚金性溫氣厚行足陽明戊土芳香上達人手太陰辛金肺者庚之弟戊之子也故主治不離三經白芷燥能耗血散能損氣有虛火者勿用癰疽已潰宜漸減去蒼耳子味甘苦性溫無毒入肝經忌豬肉米泔去刺酒拌蒸通鼻塞去膚癢能發汗散風濕主肢攣目暗療眩暈頭疼其性上通腦頂下行足膝外達皮膚乃走散之品也虛人豈可久服多服作浴湯治遍身瘙癢瘡疥採根葉熬服名萬應膏絲瓜藤根味甘氣芳性平無毒入肺經專治鼻淵通氣斷涕研末炒服常用有利此物可用至地上五尺之處曬乾研末入鍋炒待散發香氣取起每用一錢至二錢紅糖水調服亦能治老年之咳嗽多痰者蕺菜一名魚腥草以其味如魚氣也味辛氣腥性微溫有小毒入肺大腸二經鼻中發腥臭肺癰唾膿血塗痔瘡熏肛脫寬胸膺除濕熱此物可作菜食炒熟則無腥氣矣老人胸痛嚼食可止木芙蓉花及葉味微辛性平無毒入肺經清肺涼血散熱解毒消腫止痛排膿除濁鼻齆難通以之內服咳唾臭痰仗其清肅癰癤疔瘡痄腮時毒用作外敷能於平復此花又名拒霜花性滑涎黏內服多花葉並用外塗則單用其葉伍以菊花葉紅豆粉尤妙名清涼散鵝不食草見外治三眼科用藥穀精草味甘性溫無毒入肝胃二經頭風翳膜遮睛眉痛牙疼疥癢田中收谷後多有之田低而谷為水腐得谷之餘氣結成此草其亦得天地之和氣者歟兔糞名望月沙兔喜食此草故目疾家收之如未出草時兔糞不可用也決明子味鹹性平無毒入肝經青盲內障翳膜遮睛赤腫眶爛淚出羞明此馬蹄決明也以決能明目故得此名另有草決明石決明與之同功而各為一種石決明獨與雲母石相反密蒙花味甘性平無毒入肝經酒潤焙養營和血退翳開光大人眥淚羞明小兒痘疳攻眼獨入東方為滌熱和營之用故治目之外無他長也蕤仁味甘性溫無毒入肝經湯浸去皮尖水煮過研膏退翳膜赤筋理眥傷淚出破心下結痰除腹中痞氣外能散風內能清熱肝氣和則目疾愈痰痞皆熱邪為祟故宜並主目疾不緣風熱而因於虛者勿用木賊草味甘苦性平無毒入肝經迎風流淚翳膜遮睛木賊為磋擦之需故入肝而伐木去節者善發汗中空而輕有升散之力也木賊多服損肝不宜久用夜明砂味辛性寒入肝經惡白薇白蘞淘淨焙用明目活血行瘀清積即蝙蝠矢也因食蚊砂皆蚊眼故治目疾本草稱其下死胎則其攻血積也何疑紫貝齒味鹹性平無毒入脾肝二經除熱平肝安神明目治驚愓而不眠退遮睛之翳膜此物煎湯須打碎或研末外用點眼須水飛羊膽見食療爐甘石見外治銅青見外治四耳科用藥龍膽草味苦澀性大寒無毒入肝膽二經惡地黃酒浸炒大苦大寒性沉而降主肝膽熱邪耳鳴頭脹清下焦濕火陰癢生瘡火炎上而咽痛濕蘊中以目黃小兒高熱驚癇成人傷寒發狂稟純陰之氣但以蕩滌肝膽之熱為職龍膽大苦大寒苟非氣壯實熱之證不能率爾輕投女貞子及葉味苦性平無毒入肝腎二經滋肝陰以明目益腎陰以聰耳黑鬚發養精神膂力加倍腰膝健壯合鱧腸成二至之丸為益陰妙品齦衄頭昏均可治伍荷葉為二至之茶乃清上佳飲額疼眩暈陽浮巔頂總堪嘗稟天地至陰之氣故凌冬不凋氣薄味厚陰中之陰降也雖曰補益偏於陰寒者也脾胃虛家久服之往往腹痛作瀉又尚有女貞子桑椹子蔓荊子合用之驗方名三子煎治頭風及因虛風動有抽筋之感覺者女貞葉味微苦性平無毒除風散血消腫定痛治頭目昏疼祛血凝熱腫口舌生瘡搗汁含用黑豆見食療骨碎補味苦性溫無毒入腎經去毛蜜蒸主骨碎折傷去瘀生新耳響不聰牙疼發落上熱下冷腎虛泄瀉所治諸症皆是足少陰腎經觀其命名想見功力戴元禮用以治骨痿有效經疏云勿與風燥藥同用菖蒲味辛性溫無毒入心脾二經秦艽為使惡麻黃忌飴糖羊肉勿犯鐵器令人吐逆石生細而節密者佳去毛微炒宣五臟耳聰目明通九竅心開智長和中闢濁能出音聲風寒濕痹宜求咳逆上氣莫缺止小便利理膿疱瘡菖蒲稟孟夏之氣合從革之辛芳香利竅辛溫達氣心脾之良藥也故善宣通能除濕痹菖蒲香燥陰血不足者禁之惟佐地黃門冬之屬資其宣導臻於太和與遠志伍入涼膈散名轉舌膏可清心寧神轉舌活命路路通味苦澀性平無毒入脾經兼能通十二經能通十二經穴祛邪辟瘴卻瘟除筋絡拘攣治周身痹疼通竅活血通乳行經利水除濕腫消全身薰衣除蚤闢穢須焚此藥鼻科耳科常用之蓋取其通竅活血也磁石味辛性溫無毒入腎經惡牡丹皮莽草畏石脂火煅醋淬水飛治腎虛之恐怯鎮心臟之怔忡能消目障可治耳聾鎮心益腎故磁朱丸用之可暫用不可久也咽痛久久不愈查無所見者用之能引熱下行苦丁茶味甘性苦氣香無毒入肝腎二經乃取歙縣之茶葉以苦丁葉即枸骨俗名老鼠刺同焙製成故又稱角刺茶清頭目散肝風瀉腎火涼胞宮活血脈斷斯螽聤耳流膿耳鳴或聾陰浮於上眩暈瞈矇孕婦忌用虎耳草見外治五咽喉科用藥陳蘿蔔英味辛苦性平入肺脾胃腸三焦等經清咽消痰下氣和中喉痛失音胸悶腹膨化積滯利關節散瘀血治痢疾立冬時拔取扁白小蘿蔔連葉臥於地數日之後葉即翹起而根心已空乃根汁已入葉中矣故能具如上之效切下風乾備用乃咽喉病不可或缺之藥也金蓮花味微苦質滑性寒無毒入肺及心肝脾腎諸經治口瘡喉腫消浮熱牙宣耳疼目痛均治疔瘡大毒能痊此藥既可仗其寒涼敗毒治急熱之症又可用以泡茶清上清火治諸種慢症其氣芳香沏之藥色與茶色相兼頗為悅目甘草詳見補氣藥茲將有關咽喉部分補述於此治咽喉症多仗此品紅腫者用之取其清咽也多伍桔梗陳蘿蔔英金蓮花等用破潰生瘡起泡者用之取其清火也多伍元參升麻或黃連用腐爛者用之取其解毒也多伍七葉一枝花或金果欖用殗殜久而虛弱咽喉痛者用之取其補益也多伍玉竹北沙參用入吹喉藥中又有止痛消腫緩急利於吞咽及改善藥味諸作用療治咽喉疾患除兼有嘔吐者外必要時亦可用甘草露以代之往往以之與諸藥配合而行可作主藥又可作輔藥及佐使藥喉癰喉癤喉疔則改用甘草節以其專治腫毒諸瘡也桔梗味苦辛性平無毒入肺經畏白芨龍膽草泔浸去蘆微焙清肺熱以除癰痿通鼻塞而理咽喉排膿行血下氣消痰定痢疾腹痛止胸脅煩疼桔梗為舟楫之劑引諸藥上至高之分以成功肺經要藥也風症鬱症肺證皆不可缺桔梗功著於華蓋之臟攻補下焦藥中不可入也殭蠶味鹹辛性溫無毒入肺脾二經惡桑螵蛸桔梗茯苓萆薢米泔浸一日待涎浮水上微火焙乾去絲及黑口甲祛風解痙清咽消腫治中風失音去皮膚風癢化風痰消瘰癧拔疔毒滅瘢痕男子陰癢女人崩淋即蠶之病風者用以治風殆取其氣相感歟蠶蛻與蠶連紙治牙齦咽喉聲音諸病蟬殼味鹹性寒無毒入肺肝脾三經沸湯洗淨去足翅曬乾清咽喉療喑啞快痘疹之毒宣皮膚之風小兒驚癇夜啼目疾昏花障翳感木土之氣吸風飲露其氣清虛故主療皆風熱之恙又治音聲不響及嬰兒夜啼取其晝鳴夜息之義也痘疹虛寒證忌服馬勃味辛性平無毒入肺經清肺而喘嗽失音可治解熱而喉疼鼻衄堪瘳外敷諸瘡兼能散血生濕地朽木上狀如肺肝紫色虛軟彈之粉出取粉用牛蒡子一名鼠黏子一名惡實味辛性平無毒入肺經酒炒研滑能瀉熱辛可散結宣肺氣理痘疹清咽喉消腫毒開毛竅除熱毒為痘疹要藥牛蒡子性冷而滑惟血熱便閉者宜之否則忌用浙貝母又稱大貝母味苦性微寒無毒入肺肝二經清肺平肝止咳化痰消腫散結喉蛾時毒配合栝蔞可以潤腸玄參牡蠣同治瘰癧浙貝消腫尤其上部之腫其效甚捷如咽喉口舌牙齦唇頰頸項鼻腔等之結塊與腫厚者均可以消散又川貝用於內傷浙貝用於外感宜加區別射干味苦性平有毒入肺經泔浸煮之清咳逆熱氣捐喉痹咽疼治弄舌與搖頭除蟲蛇之毒螫泄熱散結多功於上焦一陰一陽結之急症關下喉痹妨於吞咽與鬱金等為伍以入心包之牡丹花走三焦之梔子花為引經其效甚捷射干雖能泄熱不能益陰故別録云久服令人虛虛者大戒紅牡丹花瓣味辛苦性平入心胞經急症喉痹與梔花為伍可解手厥陰手少陽之結吞咽有礙與射干共用能除咽堵塞食難下之危此花瀉伏火而散結又能涼血活血故急症關下喉痹用之有奇功梔子花瓣連蒂用味微苦性平無毒入肺三焦二經瀉火消痰清熱除煩急症關下喉痹配伍牡丹射干朱丹溪謂梔子瀉三焦火解熱鬱行結氣滇南本草謂梔子花瀉肺家實痰實火與牡丹花瓣同行解急症關下喉痹之危有顯效山豆根味苦性寒無毒入心肺二經含之咽其汁解咽喉腫毒切片夾患處治牙齦腫痛消熱結瘡瘍下寸白諸蟲其味大苦大寒脾胃所苦食少而瀉者切勿沾唇錦燈籠味酸苦性偏寒無毒入肺小腸二經肺熱咳嗽咽痛生瘡能利小便亦治目黃此藥清肺火能消痰故治小兒風溫及咽中生瘡甚效然其味惡須與甘草同行方易下咽孕婦忌用鴨跖草味苦性寒無毒入心肝脾肺腎大小腸膀胱諸經退熱去火消腫利尿咽喉紅腫疼痛高燒難咽垂危鮮者煎水熱退春回若兼浮腫或歷節痹小溲短少口渴無苔赤豆同煮切勿徘徊疔瘡丹毒亦可消災此草苦寒瀉火引熱下行但須火熱內蘊之症方可投之金果欖味極苦性涼無毒入肺胃二經寒涼敗毒靖咽清上咽喉紅腫腐破口爛目痛耳脹磨汁內服生效極良亦可外用吹嗓治瘍此藥味大苦若與甘草同行既可矯味又能增加療效但須磨汁兌服其效更顯又可磨敷腫毒冷塗能止其急痛研末加冰片作吹藥亦佳金鎖銀開又名野蕎麥味辛性偏涼入肺肝二經解毒消腫通塞去痰喉閉用之可使開關咽喉閉塞不通用其根醋磨含漱去痰涎而閉者可開其莖葉亦可煎湯內服清痰消腫項部兼有腫塊者外治內服均可雪裡青即白毛夏枯草一名筋骨草味苦性寒無毒入肺經喉蛾紅腫火旺口乾清咽解毒止咳去痰養筋和血痹痛能安咽喉病火熱象重者用之尤宜荔枝草味苦辛性涼清解熱毒咽喉腫痛能消涼血利尿浮腫溲渾可治外用止血研末塗痔咽喉腫甚難咽者亦可用其汁探吐玄參味苦咸性微寒無毒入腎經惡黃耆乾薑大棗山茱萸反藜蘆忌銅器蒸過曬乾黑潤者佳滋陰降火益腎生津解煩渴利咽喉明眼目清蒸熱癆證骨蒸傷寒斑毒外科瘰癧癰疽女科産乳余疾色黑味鹹腎家要藥明目除蒸皆壯水之效也至如咽痛煩渴癍毒癧瘡皆肺病也正為水虛火亢金受賊邪但與壯水鎮其陽光産乳余疾亦屬陰傷故應並主石室祕録云玄參去浮游之火又云亦能平胃火之浮游玄參寒滑脾虛泄瀉者禁之麥門冬味甘微寒無毒入心肺二經地黃車前為使惡款冬花忌鯽魚肥白者佳去心用退肺中伏火止渴益精清心氣驚煩定血療咳燥咳痰稠宜用咽乾津少頻嘗麥門冬稟秋金之微寒得西方之正色故清肺多功心火焦煩正如盛暑秋氣一至炎蒸若失矣心主血心既清寧妄行者息脾受濕熱則肌肉腫而腸胃滿熱去即濕除腫滿者自愈金不燥則不渴金水生則益精麥門冬與天門冬功用相當寒性稍減虛寒泄瀉仍宜忌之枸橘葉一名臭橘臭枳味辛苦性溫其臭導毒其宣解鬱療咽喉怪症生瘻治後重下痢膿血夏子益奇病方云咽喉生瘡層層如疊不痛日久出臭氣廢飲食用臭橘葉煎湯連服必愈李時珍謂此葉治喉瘻消腫導毒其果實亦能治喉蛾絡石藤味甘微酸性平無毒入心脾胃腎四經消咽腫利關節喉舌腫閉水漿不入可消流注能堅筋骨此藥以開芳香小白花者為良喉蛾與關節腫痛併發者宜用紫荊皮味苦性平無毒入心包肝二經活血行氣止痛消腫散結解毒癰疽未成釀膿未熟速破宿血未固先逐喉癰初起用之煎服往往能消免生危篤外敷瘍腫其勢可束此藥用之宜早能消癰腫於血氣剛凝之際外消之力亦大如意金黃散中即用之訶黎勒味苦性溫無毒入肺大腸二經蒸去核焙固腸而泄痢咸安斂肺而喘嗽俱止利咽喉而通津液可以清音下食積而除脹滿能驅冷氣按其主用皆溫澀收斂之功若肺有實熱瀉痢因濕熱氣喘因火沖法咸忌之蓬砂味苦辛性寒無毒入肺經治咽喉痛最為切要潤嗓開音生津止燥積聚堪嘗咳嗽有效華蓋失其清肅痰熱壅於上焦雖作內服用量宜少外治多端主在七竅目翳耳膿可點鼻胬木舌能消谷賊與骨哽噙除齦腫與口氣含妙用洗潰瘍淨而膿少性能柔五金則消克可知但療有餘難醫不足虛勞證內服非所宜也百草霜味辛性溫無毒清咽治痢解熱定血療陽毒發狂醫瘡生口舌黑奴丸用以療陽毒發狂亦從治之義也玄精石味甘咸性寒無毒入肺心胃腎四經咽喉腫痛不利似噎重舌腫脹涎出不絶目生赤脈頭痛如裂成人傷寒小兒風熱狂言煩渴虛汗肢厥面色青黑心下滿結熱深傳裡危在旦夕甘寒沉降扶危拯逆此藥之功主要在於降字故治熱盛於上之疾多功此李時珍之卓見張氏又增沉字更為中肯方氏脈症正宗謂肺胃蘊熱生痰玄精石研極細每服三分煉蜜一匙和白湯調服用之頗有良效石蟹味鹹性寒無毒入肺心胃肝四經喉痹劇痛磨其汁內服外敷均效青盲目翳入湯液撥雲開霧有靈救漆瘡中蠱治熱疾天行既可催生又療血運馬志謂此物須細研水飛入諸藥相助用之玉揪藥解謂其清心瀉熱孕婦忌服土牛膝味苦酸性平生用入肺胃二經搗汁生吞治喉風湧吐痰涎能於救急用之煎服消咽腫清火降濁引熱下行此即野生牛膝俗稱方梗對葉草生用之以湧吐救急往往轉危為安曬乾研末又可伍薄荷硼砂冰片等作吹喉藥用另有一種杜牛膝也混稱土牛膝亦具良效別詳下條杜牛膝味甘辛性平入肺經咽喉腫痛搗汁鵝翎探掃湯水不下用之可以開關杜有假借之意引伸之又有代替之意即功效與莧科植物土牛膝相仿可用之代替治咽喉者一名天名精亦即李時珍所謂開小黃花如小野菊花者乃菊科植物近世華南用以治白喉者即此種過去土牛膝與杜牛膝兩種每每混稱當依本草綱目專稱天名精之根為杜牛膝以示區別秋海棠梗見外治西瓜霜見外治緑萼梅花味微酸澀性平無毒入肝肺二經開鬱和中生津除渴止口燥飲而不解治咽乾如有異物躁煩易怒多疑酸以柔之可擇此花同諸藥製為丸遠行含之可以不渴玫瑰花味甘微苦氣香性溫入脾肝二經理氣散氣和血行血止痛寬胸開鬱解結咽喉阻窒如有葉貼酒煎內服乳腫可滅少林拳經明載用治損傷僕跌此花亦可與香櫞花同作茶劑飲之能消胸中鬱悒之氣木蝴蝶味苦性偏寒無毒入肺肝二經平肝潤肺止痛和中脘脅時疼音啞不洪潰瘍日久貼之能封音嗄由於肝肺不舒者用之尤宜青蘘即芝麻葉味甘性微寒無毒能入肺心脾肝腎大腸諸經安五臟健頭面益氣腦髓補祛風筋骨堅風寒濕痹可去傷於暑熱能蠲皮膚澤滑血色和妍聰耳明目返老壽延咽喉缺爽嚼之可痊湯沐祛風發潤矣作蔬毒解腸潤焉此為平和無害之良藥不能以其易得而忽之唯藥肆不備須預蓄焉芝麻殼俗稱芝麻鈴性味同青蘘酒水煎治半身不遂得汗生效燒存性治湯火外傷麻油調塗咽喉不利覺堵煎之常服能除此物於收成後趁殼青時陰乾收藏備用棉花殼味甘性溫入胃經爽利咽關通暢食嗓降氣平逆吞咽無妨此即棉桃之果皮收花後趁青陰乾收貯備用本草綱目拾遺謂用此忌食鵝棉根能強壯體力可代黃耆六口齒科用藥營實附根葉即薔薇味酸澀性微寒無毒入胃經治上焦有熱咽喉痛癢以及口瘡糜爛利關節筋骨歷節風疼又主遺尿好暝冬用根皮夏用枝葉秋用子專達陽明解熱為口瘡之聖藥內服外用皆宜以其性澀故兼有遺尿之療也蘆根味甘性寒無毒入肺胃二經清肺胃火生津止渴治肺癰除嘔噦胸中煩熱鮮者煎嘗牙疳腐爛生飲其汁入太陽陽明清熱下降故主治如上蘆芽能解河魨毒按霍亂嘔吐由於寒者勿服絲瓜絡味甘性平無毒入肺胃肝三經通經絡行血脈去風化痰涼血解毒風熱襲絡項僵頭木喉閉齦腫痄腮時毒腸風痔漏下血危篤乳汁不通燒研酒服鮮絲瓜葉可搗敷天泡瘡若和入碧玉散即六一散加青黛更妙絲瓜藤治鼻病絲瓜作食療另列專條升麻味甘苦性平無毒入肺胃脾大腸四經青色者佳忌火解百毒宣肌腠闢疫瘴止喉疼頭痛齒痛口瘡斑疹散陽明風邪升胃中清氣稟極清之氣而升得陽氣之全者也故宣腠辟邪頭喉口齒皆在高巔之上風邪斑疹皆在清陽之分總獲其升清之益凡氣虛下陷如瀉痢崩淋脫肛遺濁須其升提虛人之氣升少降多內經曰陰精所奉其人壽陽精所降其人天東垣取入補中湯獨窺其微矣升麻屬陽性升凡吐血鼻衄咳嗽多痰陰虛火動氣逆嘔吐怔忡癲狂切勿誤投蒲黃味甘性平無毒入心包肝二經生用破瘀消腫炒用補血止血醫血氣心腹痛外治塗耳與舌舌脹滿口重舌生瘡以此頻摻平復如常此與五靈脂同行名失笑散乃應急之名方木槿花味甘淡性涼質滑無毒清濕熱涼血熱久痢帶下痔瘡出血口內之瘡頻發常用頗有效益此花質滑可打滷拌入麵條以作食療口瘡屢屢發作用之有良效臘梅花味辛性溫無毒解暑生津點茶頻飲口乾舌燥用之多靈此花溫而不燥乃溫潤之劑也露蜂房味甘性溫有毒惡乾薑丹參黃芩芍藥牡蠣炙止風蟲牙齒之痛拔疔瘡附骨之根起陰痿而止遺尿洗乳癰而塗瘰癧蜂房乃黃蜂之巢蜂大房大且露天樹上者為勝其用以毒攻毒若癰疽潰後禁之四肢百骸一養筋骨利關節秦艽味苦辛性平無毒入肝膽胃三經菖蒲為使畏牛乳左紋者良祛風活絡養血舒筋能利濕養胎治黃疸骨蒸秦艽長於養血故能退熱舒筋治風先治血血行風自滅故療風無間久新入胃祛濕熱故小便利而黃疸愈也下部虛寒小便不禁及大便滑者忌用續斷味苦辛性微溫無毒入肝經地黃為使惡雷丸酒浸焙補肝腎治勞傷通經絡續筋骨破閼結利關節縮小便止遺泄癰毒宜收胎産莫缺補而不滯行而不泄故外科女科取用宏多也雷公云草茆根似續斷誤服令人筋軟杜仲味辛甘性溫無毒入肝腎二經惡玄參蛇蛻去浮皮酥炙強筋壯骨益腎添精腰膝之疼痛皆痊遍體之機關總利腎苦燥急食辛以潤之肝苦急急食甘以緩之杜仲辛甘故主用如上亦治陰下濕癢小便餘瀝腎虛火熾者勿用狗脊味苦性平無毒入肝腎二經萆薢為使銼焙強筋最奇壯骨獨異男子腰腳軟疼女人關節不利狀如狗之脊故名狗脊以形得名也別名扶筋以功得名也五加皮味辛性溫無毒入腎肝二經遠志為使惡玄參明目舒筋歸功於藏血之海益精縮便得力於閉蟄之官風濕宜求疝家必選五加皮服食家誇之不已嘗曰寧得一把五加不用金玉滿車雖詞多溢美必非無因而獲此譽也下部無風寒濕邪而有火及肝腎虛而有火者皆忌之石南葉味辛苦性溫無毒入肝腎二經關中者佳利皮毛筋骨治風痹內傷男子陽衰堪酌服婦人陰冷可頻嘗今人不用以藥性論有陰痿之說耳不知能令腎強人或藉此縱欲以致痿弱豈其咎哉桑枝味微苦性平無毒入肝脾二經祛風濕利關節肩臂痠疼肌膚麻木此物性極平和可久服亦可泡酒頻飲桑寄生味苦性平無毒入肝經忌火和血脈充肌膚而齒髮堅長舒筋絡利關節而痹痛捐除安胎簡用崩漏徵醫能益血兼能去濕故功效如上海外深山地暖不蠶桑無採捋之苦氣化濃密自然生出有言鳥銜他子遺樹而生者非也松節味苦性溫無毒入肝腎二經舒筋止肢節之痛去濕搜骨肉之風苦燥溫通能燥血中之濕故陰虧血虛者不宜多用豨蘞味苦性寒有小毒入肝腎二經肢節不利肌體麻痹腳膝軟疼纏綿風氣能宣能補故風家珍之本草相傳功用甚奇然近世服之經年罕效意者製法未盡善歟風氣有分別歟藥産非道地歟亦以見執方者之失也豨蘞長於理風濕畢竟是祛邪之品恃之為補未敢信也木瓜味酸性溫無毒入肝經陳者良忌鐵去穰筋急者得之即舒筋緩者遇之即利濕痹可以兼攻腳氣惟茲最要得東方之酸故入厥陰治筋非他藥所能儔匹東垣云氣脫能收氣滯能和故於筋急筋緩兩相宜耳孟洗云多食損齒及骨素問所謂陰之所生本在五味陰之所營傷在五味五味太過則有增勝之憂也牛膝味苦酸性平無毒入肝腎二經惡龜甲忌牛肉酒蒸壯筋骨利腰膝除寒濕解拘攣益精強陰通經墮胎理膀胱氣化遲難引諸藥下行甚捷肝為血海而主筋血海得補則經通而攣急者解矣骨者腎所司也腰者腎之府也精者腎所藏也小便者腎所主也補腎則衆疾咸安寇宗奭云牛膝同蓯蓉浸酒飲益腎墮胎者以其破血下行耳石室祕録云牛膝乃引下之絶品牛膝主用多在腎肝下部上焦藥中勿入氣虛下陷血崩不止者戒用天仙藤即馬兜鈴之藤葉也味苦性偏溫入脾肝二經流氣活血利水除風化濕止痛鬱滯宣通經遂暢達絡道和融腿膝痠疼妊娠水腫此藥功用雖多不出宣通氣血四字成方切用謂其能解血中之風氣對奇經八脈之陽維陰維陽蹺陰蹺有強健及療治之功二搜逐風寒濕獨活羌活味苦甘性平無毒入小腸膀胱肝腎四經風寒濕痹筋骨攣疼頭旋掉眩頸項難伸本入手足太陽表裡引經又入足少陰厥陰小無不入大無不通故既散八風之邪兼利百節之痛時珍曰獨活羌活乃一類二種中土産者為獨活色黃氣細可理伏風西羌出者為羌活色紫氣雄可理遊風獨活羌活皆主風疾若血虛之頭痛及遍身肢節痛誤用風藥反致增劇威靈仙味苦性溫無毒入膀胱經忌茶茗面宣五臟而療痛風去冷滯而行痰水此風藥之善走者也威者言其猛烈靈者言其效驗威靈仙大走真氣兼耗人血不得已而後用之可也防己味苦辛性寒無毒入膀胱經惡細辛畏萆薢女菀滷鹼止痹痛利關節祛下焦之濕瀉血分之熱理水腫腳氣通二便閉結防己分木漢二種木者專風漢者專水東垣云防己大苦大寒瀉血中濕熱亦瞑眩之藥也服之使人身心煩亂飲食減少惟濕熱壅遏及腳氣病非此不效若虛人用防己其害有三穀食已虧復泄大便重亡其血一也渴在上焦氣分而防己乃下焦血分二也傷寒邪傳肺經氣分濕熱而小便黃赤禁用血藥三也老鸛草味苦微辛性平祛風濕活絡脈關節疼痛肢體麻木此草治風寒濕痹平穩可取海桐皮味苦性平無毒入脾胃二經除風濕之害理腰膝之疼可塗疥癬亦治牙蟲腰膝痛非風濕者不宜用治癬治牙須與他藥同行虎杖俗名斑根味苦性平無毒活血定痛清利濕熱久患痹症更番歷節變形僵硬可使靈活用以泡酒內飲外擦手足漫腫熬湯浸漬孕婦忌用海風藤味辛苦性微溫入心腎二經祛風濕通絡道可舒筋能理氣關節疼痛頻作腰膝屈伸缺利此藤亦能治跌僕損傷虎骨味辛性溫無毒脛骨最良酥炙壯筋骨而痿軟可起搜毒風而攣痛堪除風從虎虎嘯而風生故骨可以入骨而搜風也穿山甲古名鯪鯉甲味鹹性寒有毒炙黃搜風逐痰破血開氣療蟻瘻絶靈截瘧疾至妙治腫毒未成即消已成即潰理痛痹在上則升在下則降穴山而居寓水而食能走竄經絡無處不到直達病所成功患病在某處即用某處之甲此要訣也性猛不可過服蘄州白花蛇味鹹性溫有毒去頭尾酒浸三宿皮骨俱有大毒應去盡主手足癱瘓及肢節軟疼療口眼歪斜及筋脈攣急厲風與破傷同寶急驚與慢驚共珍透骨搜風截驚定搐為風家要藥內達臟腑外徹皮膚無處不到服者大忌見風産蘄州者最佳然不可多得龍頭虎口黑質白花脅下有二十四方勝紋腹有念珠斑口有四長牙尾有爪甲長一二分腸如連珠眼光如生産它處者或兩目俱閉或一開一閉也白花蛇性走竄有毒惟真有風者宜之若類中風屬虛者大忌烏稍蛇大略相同但無毒而力淺色黑如漆尾細有脊者良淘鵝油見外治外科皮科骨傷科蚤休紫花地丁味苦辛性寒入心肺肝三經疔瘡癰癤無名腫毒咽喉谷賊嚼咽清肅此藥清解熱毒內服多效亦可搗爛外敷半枝蓮味微苦性涼清解熱毒活血去瘀治疔毒散黃塗跌僕蛇傷此草亦治咽喉腫痛兼潰爛者宜用之忍冬藤味辛甘苦性微寒無毒入心肺二經散熱解毒除濕醫瘍身腫發無定處流火流注堪嘗風濕熱痹疔瘡散黃伍甘草與好酒對口發背均治上方制以為丸消渴成癰可防喉蛾痄腮口舌生瘡此藤與花相同亦能除脹治痢蒲公英一名黃花地丁味甘性平無毒入脾胃二經化熱毒解食毒治痄腮疔瘡消乳癰瘰癧乳癰同銀花煎入酒服莖中白汁塗惡刺東垣曰苦寒入腎腎經必用之藥故本草載其有烏鬚髮之功何以世人罕用也山慈菰味甘辛性平有小毒入胃經癰疽疔毒酒煎服瘰癧瘡痍醋拌塗治毒蛇狂犬之傷傅粉滓斑點之面寒涼之品不得過服土貝母味苦性微寒散結消腫軟堅解毒乳房生塊頸部瘰癧鼻齆難通少通多塞蒼耳芙蓉同施有益土貝母與川貝之潤肺浙貝之止咳不同旨在消腫兼能解毒鼻內腫窄而氣難通並非息肉者與芙蓉葉蒼耳子白芷菖蒲路路通等同行有益同時可用冰片白芷二藥共研吸之海藻味苦咸性寒無毒入腎經反甘草消瘰癧癭瘤散癥瘕癰腫苦能泄結寒能滌熱咸能軟堅故主療如上脾家有濕者勿服昆布味鹹性寒無毒入腎經洗淨頑痰結氣積聚癭瘤咸能軟堅噎證恆用之取其祛老痰也昆布之性雄於海藻不可多服令人瘦削馬鞭草味苦性寒無毒入肝腎二經清解熱毒治面頰腫敗楊梅惡氣理髮背瘡癰血閉宜求癥瘕須用此草專以驅逐為長瘡症久而虛者斟酌用之咽腫連頰飲汁甚效蓋其行血活血消腫解毒之功也皂莢刺性味歸經畏惡詳見治痰藥皂莢條其性鋭利直達瘡區山甲相伍穿透癰疽為癰疽妒乳丁腫未潰之神藥醋熬嫩刺塗癬有效癰疽已潰者勿服孕婦忌用白膠香味辛苦性平無毒入脾肝二經活血涼血解毒止痛內可消疽金瘡癰腫瘰癧隱疹吐衄皆用外治牙疼骨哽能通此香性黏膩能去風燥對外症內服外用均宜故小金丹中用之又藏書家除夕每用以熏書謂可闢螙魚乳香味辛性溫無毒入心經若土烘去油同燈心研之則細定諸經之痛解諸瘡之毒活血舒筋和中治痢香口闢臭頻用噙之風蟲牙痛含而嚼之諸瘡痛癢皆屬心火乳香入心內托護心外宣毒氣有奇功也但疽已潰勿服膿多者勿敷凡筋不伸者加入熏洗藥中有效咽喉骨哽水研下咽往往滑利而下沒藥味苦性平無毒入肝經製法同乳香宣血氣之滯醫瘡腐之疼可攻目翳堪墮胎兒血滯則氣壅故經絡滿急發腫作痛沒藥善通壅滯和血去瘀則血行而氣暢痛止也骨節痛與胸腹筋痛不由血瘀而因於血虛産後惡露去多腹中虛痛癰疽已潰法咸禁之乳香偏於調氣沒藥偏於散血二者每相兼而用松脂味苦甘性溫無毒入肺胃二經水煮百沸白滑方可用祛肺金之風清胃土之熱除邪下氣壯骨強筋排膿止痛生肌煎膏而用牙疼惡痹崩中研末而嘗咽乾含化耳聾丸吞松脂感太陽之氣而生燥可去濕甘能除熱故外科取用極多也松脂性燥而溫血虛者勿服白蘚皮味苦性寒無毒入脾經惡桔梗茯苓萆薢主筋攣死肌化濕熱毒瘡風痹要藥利竅稱良治黃疸咳逆淋瀝愈女子陰腫生瘍地之濕氣感則害人皮肉筋脈白蘚皮善除濕熱故療肌死筋攣瘡毒下部虛寒之人雖有濕證弗敢餌也地膚子味苦性寒無毒入脾膀胱二經利膀胱散惡瘡皮膚風熱可作浴湯其主用多在皮膚其入亦在土臟蓋脾主肌膚也即其利水兼能祛濕者歟葎草土名虜蘿藤味甘苦性寒無毒入肺脾大小腸四經潤三焦益五臟主瘀血清兩腸退恙後虛熱洗遍體疥瘡根能治瘰癧花治虛勞盜汗此草隨處有之惜藥肆不備醫家亦少知利用乃農村易得之良藥也槐枝見外治劉寄奴味苦性溫入心脾二經破血去瘀通經止痛跌僕損傷癥結亦用此藥為破血之品多服令人吐利故血氣虛弱無瘀滯者忌用自然銅味辛性平無毒續筋接骨折傷者依然復舊消瘀破滯疼痛者倏爾消除自然銅雖有接骨之功頗多燥烈之性宜慎用女科當歸味甘辛性溫無毒入心肝脾三經畏菖蒲海藻生薑酒洗去蘆去瘀生新舒筋潤腸溫中止心腹之痛養營療肢節之疼外科排膿止痛女科瀝血崩中心主血脾統血肝藏血歸為血藥故入三經而主治如上本經首言主咳逆上氣辛散之勳也頭止血尾破血身補血全和血能引諸血各歸其所當歸之經故名當歸氣血昏亂服之即定當歸善滑腸泄瀉者禁用入吐血劑中須醋炒之白芍藥味苦酸性微寒無毒入肺脾肝三經惡石斛芒硝畏鱉甲小薊反藜蘆煨熟酒焙養血斂陰柔肝定痛通補奇經女科必用斂肺而主脹逆喘咳腠理不固安脾而主中滿腹痛瀉痢不和制肝而主血熱目疾肋下作疼收斂下降適合秋金故氣寧而汗止專入脾經血分能瀉肝家火邪故功能頗多一言以蔽之斂氣涼血而已矣李時珍曰芍藥同白朮補脾同芎藭瀉肝同人參補氣同當歸補血以酒炒補陰同甘草止腹痛及腿痠拘攣同黃連止瀉痢同防風發痘疹同薑棗溫經散濕張元素曰其用凡六安脾經一也治腹痛二也收胃氣三也止瀉痢四也和血脈五也固腠理六也本草求真曰血盛於氣則血凝而不行氣盛於血則血燥而益枯血之盛者必賴辛為之散故川芎號為補肝之氣氣之盛者必賴酸為之收故白芍號為斂肝之液收肝之氣而令氣不妄行也芍藥之性未若芩連之苦寒而寇氏云減芍藥以避中寒丹溪云産後勿用芍藥恐酸寒伐生生之氣嗟乎藥之寒者行殺伐之氣違生長之機雖微寒如芍藥古人猶諄諄告戒況大苦大寒之藥其可肆用而莫之忌耶丹參味苦性微寒無毒入心經畏鹹水反藜蘆安神散結益氣養陰去瘀血生新血安生胎落死胎胎前産後帶下崩中色合丙丁獨入心家專主血證古稱丹參一味與四物同功嘉其補陰之績也丹參雖能補血長於行血妊娠無故勿服益母草味辛性微寒無毒入心胞肝二經忌鐵活血行瘀利水消腫經閉不通經來腹痛臨盆難産子死腹中補而能行辛而能潤為胎産要藥此草善行走凡崩漏者慎用紅花味辛性溫無毒入心肝二經酒噴微焙通調血脈去瘀生新産後血暈急需胎死腹中必用時珍曰活血潤燥行血之要藥也紅花過用使人血行不止人所未知月季花味甘性溫活血調經消腫止痛此花品種甚多以每月開小紅花俗稱月月紅者入藥為佳澤蘭味苦甘性微溫無毒入肝脾二經通達九竅用於女科和血有消瘀之能利水有消蠱之效甘能和血獨入血海攻擊稽留其主水腫者乃血化為水之水非脾虛停濕之水也又荀子云澤芷以養鼻蓋謂澤蘭白芷之氣芳香通乎肺也澤蘭行而帶補氣味和平無偏勝之憂艾葉味苦性微溫無毒入肺脾肝腎四經苦酒香附為使陳久者良安胎氣暖子宮止血痢理腸風灸除百病吐衄崩中幸可利竅苦可疏通故氣血交理而女科帶下調經多需之艾性純陽香燥凡血燥生熱者禁與王不留行味苦性平無毒入大腸經水浸焙行血通乳止衄消疔王不留行喻其走而不守雖有王命不能留其行也古云穿山甲王不留婦人服了乳常流乃滑利及行血之力耳失血後崩漏者孕婦並忌之棕櫚皮味苦澀性平無毒吐血鼻紅腸毒病十全奇效崩中帶下赤白痢一切神功性澀故止血有功然惟血去己多滑而不止者宜之若早服恐停瘀為害火炒煙盡存性窨地上出火毒藕節味甘澀性平入肺胃肝三經止血消瘀吐衄崩中均可止芎藭同用鼻淵腦瀉緩能除日華諸家本草云産後血悶用藕節和地黃研汁入熱酒小便飲可以拯危又可開胃解蟹毒藕皮能散血蓮房味苦澀性溫無毒入厥陰血分能消瘀散血經事頻行不斷胎漏難於固攝煮服解野菌毒外治天泡濕熱此物不宜久服阿膠味鹹性平無毒入肺肝二經山藥為使畏大黃蛤粉拌炒止血兮兼能去瘀疏風也又且補虛西歸金臟化痰止咳除癰痿東走肝垣強筋養血理風淫安胎始終並用治痢新久皆宜阿井乃濟水之眼故入肝治血證風證如神烏騾皮合北方水色以制熱生風也真者光明脆徹歷夏不柔僞者反能滯痰不可不辨胃弱作嘔吐脾虛食不消者均忌苧麻根味甘性寒無毒安胎止血提氣固攝胎動不安肛門下脫痰哮時作小便帶血苧麻根安胎須與銀器同煎蛇床子味苦辛性溫無毒入脾腎二經男子強陽事婦人暖子宮除風濕痹癢擦瘡癬多功燒煙而吸入救咽窒難通去足太陰之濕補足少陰之虛強陽頗著奇功人多忽之寧知至賤之中乃伏殊常之品耶得地黃汁拌蒸三遍後色黑乃佳腎火易動者勿食兒科附驅蟲藥勾藤味甘性微寒無毒入肝及心胞經平肝經風祛心胞火舒筋除眩解痙息風小兒驚癇熱壅瘛瘲祛肝風而不燥庶幾中和但久煎便無力俟它藥煎就一二沸即起頗得力也去梗純用嫩勾其功十倍本草綱目云鉤藤手足厥陰藥也足厥陰主風手厥陰主火驚癇眩暈皆肝風相火之病鉤藤通心包平肝木風靜火息則諸證自除胡荽見食療薺菜花味甘性溫無毒入肝脾腎三經利肝益胃和中消脹五臟得調情志開暢小兒痰滯能消目患服之重光久痢赤白煅炭與嘗春初採菜佐餐老幼受惠無量三月初三日趁花期採其全草曬乾備用無毒而效宏為嬰幼兒病七竅病不可缺之良藥天竺黃味甘性寒無毒入心經祛痰解風熱鎮心安五臟大人中風不語小兒天吊驚癇竹之津氣結成與竹瀝功用相仿故清熱養心豁痰利竅久用亦能寒中胡黃連味苦性寒無毒入肝膽二經惡菊花玄參忌豬肉折之塵出如煙者真醫小兒疳積驚癇主虛家骨蒸久痢清肝膽之熱與黃連略似但産於胡地者也胡黃連大苦大寒脾虛血弱之人雖見如上諸證亦勿輕投必不得已須與補劑同施鶴蝨味苦辛性平有小毒入肝經蟲積腹痛入丸散用目前市售商品中有兩種藥典中以菊科天名精之果實為正品使君子味甘性溫無毒入脾胃二經殺諸蟲治疳積殺蟲藥皆苦使君子獨甘空服食數枚次日蟲皆死而出矣忌飲熱茶犯之即瀉使君子為殺蟲而設苟無蟲積服之必致損人雷丸味苦性寒有小毒入胃經荔實厚朴蓄根芫花為使惡葛根酒蒸殺臟腑諸蟲除嬰兒百病雷丸乃竹之餘氣得霹靂而生故名雷丸殺蟲之外無他長久服令人陽痿棗樹皮見外治
