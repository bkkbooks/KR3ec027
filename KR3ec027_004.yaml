body:
  text: 第四卷外治一植物藥龍腦香即冰片味辛苦性微溫無毒入心肺肝三經外用能治五官諸病可引諸藥達於深處內服能開通關竅驅逐祟邪善消風而化濕使耳聰而目明芳香為百藥之冠香甚者性溫熱善於走竄入骨搜風能引火熱之氣自外而出龍腦入骨風病在骨髓者宜也若風在血脈肌肉輒用腦麝又引風入骨如油入面莫之能出目不明屬虛者不宜入點乳香見外科沒藥見外科松脂見外科松葉味辛性偏溫可生毛髮宜窨凍瘡此葉有功於皮毛發落者用之沐頭可以新生松花粉味甘性溫外用收水拔干能治塌皮濕爛嬰兒以之撲撒創傷以之止血內服潤人心肺能於益氣除風頭目眩暈酌投痢疾亦可試治此藥以外用為主內服甚少用槐枝附葉味苦性平無毒繡球風陰囊濕癢煎頻洗平復如常可沐頭長髮須燒灰煮湯槐葉鼻氣窒塞煮汁與蔥豉調和同煎服牙齒諸風採嫩葉食川槿皮味苦性平無毒擦頑癬及蟲瘡止腸風與久痢肉厚而色紅者真不宜多服外用無妨大楓子味辛性熱有毒內仁油黃者不堪用入丸壓去油治瘡癬疥癩能劫毒殺蟲丹溪云粗工以其油治風症不知性熱傷血至有病未愈而先失明者故當以外用為主葎草土名擄蘿藤味苦性寒無毒遍體生瘡煎湯洗漬病後虛熱內服亦宜此藤能利濕熱故小便不利或淋瀝者均可用之蛇床子見女科景天一名慎火草味苦酸性寒無毒入心經諸腫火丹能療一切遊風可醫毒蛇傷咬急用搗敷大寒純陰之品故獨入離宮專清熱毒中寒之人服之有大害惟外塗不妨耳馬齒莧見清熱解毒菊葉見清散風熱鵝不食草味辛性溫入肺經鼻齆難通中生息肉呼吸有礙頭疼咳嗽以之塞鼻內服亦可此草專主辛通但嚏多者勿用雖可內服宜少用荸薺粉見附錄澱粉類秋海棠梗味酸澀性寒無毒生用搗汁含漱能治咽喉劇痛若稍稍嚥下尚無不可多則不宜西瓜霜味甘微咸無毒入肺胃大腸三經外用作散清咽喉口舌內服小量治痰火上炎將半熟西瓜留至冬至日切一小口納入元明粉半斤仍以切開之皮作蓋封懸透風之處待其吐霜頻頻掃下備用也可加冰片十分之一同研細吹患處虎耳草味辛苦性寒清涼解毒取汁外用耳竅紅腫耳底脹痛此草外治耳患有良效但須洗淨搗汁用兒茶味苦性澀生肌收澀生津化痰一任金瘡牙爛儘教痔腫陰疳口瘡以蓬砂等分研勻搽之有效又能定痛生肌故外科急需之橄欖核炭見食療棗樹皮葉味甘性溫小兒壯熱煎湯浴之此日華諸家本草之經驗也用之確有良效又名醫別錄云和葛粉揩熱痱瘡良可見此皮葉宜於外治麥麩味甘咸性寒腰足折傷風痹腳氣醋拌炒熟熨之外治汗出為度加溫互易此物農村得之甚易乃平和無害之法其效甚佳蓖麻子味甘辛性平有毒口眼不正瘡毒腫浮頭風腳氣瘰癘丹瘤胞衣不下子腸不收如前諸症皆從外治不經內服以其長於吸收能拔病氣出外凡服蓖麻一生不得食豆犯之甚者能脹死阿魏味辛性溫無毒入脾胃二經破症積辛散溫行內外同施除邪氣殺蟲化蠱實者投之臭烈殊常故殺蠱辟惡辛則能散溫則能行故消積化蠱人之血氣聞香則順聞臭則逆故凡虛人雖有痞積不可輕用當先養胃氣胃強則堅積漸磨而消矣經曰大積大聚其可犯也衰其大半而止蓋重視於根本者乎製成膏藥外貼化痞積平穩可取二動物藥麝香味辛性溫無毒入心經忌大蒜微研作外治用途甚廣若內服多入丸丹開竅通經穿筋透骨理客忤治驚癇殺蟲蠱去風痰搜穢辟邪催生墮胎救卒中之內閉消僵腫之疽癭走竄飛揚內透骨髓外徹皮毛東垣云搜骨髓之風風在肌肉者誤用之反引風入骨證屬虛者概勿施用必不得已亦宜少用李時珍謂其通諸竅王好古謂其療鼻窒不聞香臭癆怯人及孕婦不宜佩帶象皮味鹹性溫無毒合金瘡之要藥長肌肉之神丹以鉤刺插入大象皮中頃刻創收故主用如上珍珠味鹹性寒無毒入肝經絹包入豆腐中煮一炷香研極細外用收口生肌點睛退翳綿裹塞耳治聾塗面駐顏潤澤內服止渴除蒸安魂定悸稟太陰之精氣而結宜其主用多入陰經珠體最堅研如飛面方用不細損人臟腑病不由火熱者忌之蟾酥味辛性溫有毒入胃腎二經發背疔疽五疳羸弱立止牙疼善扶陽事入外科方有奪命之功然輕用能發泡爛人肌肉五倍子味苦酸澀性平無毒入肺胃二經外治糝口瘡須臾可食洗脫肛頃刻能收染鬚髮之白治目爛之疴內服斂肺化痰故止嗽有效散熱生津故止渴相宜上下之血皆止陰陽之汗咸瘳瀉痢久而能斷腫毒發而能消五倍子專收斂咳嗽由於風寒者忌之瀉痢非虛脫者忌之咳嗽由於肺火實者忌之誤服反致壅滿以其收斂太驟火氣無從泄越耳淘鵝油味鹹性溫無毒理痹痛癰疽可穿筋透骨取其脂熬化就以其嗉盛之則不滲漏雖金銀磁玉之器盛之無不透漏者此可見其入骨透髓之功然但資外敷不入湯丸三礦物藥硃砂見心經水銀味辛性寒有毒以毒攻毒解毒殺蟲僅作外用滅蝨有功輕粉性味同水銀惡瘡潰瘍久不愈合拔毒生肌外用有益成人盜汗小兒夜啼為末津調用以塗臍耳膿日久口瘡斷續疳蝕唇鼻一切腫毒用以外治往往平復手足皸裂鬚髮早白塗之染之收效亦速痔瘡日久肛門下脫燒煙先熏煎湯坐浴此藥以外用為主切勿內服黃升紅升有大毒搜膿拔毒去腐生新癰瘍久久不愈外用僵局能平此藥乃用水銀等昇華而成有毒不能內服外用伍乳香沒藥為散名三香散撒於膏藥貼於瘡口化腐提毒收效頗捷元明粉見瀉下藥雄黃味苦性平有毒研細水飛塗蛇虺之傷楊梅疔毒疥癬痔瘍遵法搽敷力不小化痰涎之積血瘀風淫邪乾屍疰依方制服效偏奇獨入厥陰為諸瘡殺毒之藥與巴豆鬱金為伍醋丸名雄黃解毒丸治急症喉痹有良效乃急救之藥也白礬味酸澀性寒無毒入脾胃二經甘草為使惡牡蠣麻黃外治收脫肛陰挺理疥癬濕淫內服消痰止利滌熱祛風礬之用有四諸血脫肛陰挺瘡瘍取其酸澀而收也喉痹癰疽蛇傷蟲毒取其解毒也吐風熱痰涎取其酸苦湧泄也治風痰泄痢崩帶取其收而燥濕也多服傷骨損心肺硫黃味酸性大熱有毒入心腎二經畏細辛朴硝鐵醋用萊菔剜空入硫合定糠火煨熟紫背浮萍同煮皂角湯淘去黑漿外用殺蟲燥寒濕疥瘡盡掃內服壯陽堅筋骨陰氣全消老年風秘君半夏而立通泄痢虛寒佐蠟礬而速止艾湯投一匕陰毒回春溫酒送三丸沉寒再造秉純陽之精能補君火可救顛危烏須黑髮亦可引年然須制煉得宜斷房者方可用之一有不當貽禍非輕故極少用外治疥瘡收效甚速然同時須服利濕解毒之劑庶不致瘡毒內攻而生浮腫難治硼砂見咽喉藥赤石脂見澀大腸爐甘石味甘性溫煅水飛散風熱而腫消祛痰氣而翳退金銀之氣所結為眼科要藥銅青味辛酸無毒入肝經內服眼科主風熱之疼外科止金瘡之血內科吐風痰之聚女科理血氣之痛殺蟲有效疳證亦宜色青入肝專主東方之證然服之損血食療一穀類胡麻味甘性平無毒入肝脾腎三經其色如醬其狀如蝨九蒸曬養血潤腸燥結焦煩誠易退補中益氣風淫癱瘓豈難除堅筋骨明耳目輕身不老長肌膚填腦髓辟穀延年補陰是其本職又去風者所謂治風先治血血行風自滅也李廷飛雲風病人久服步履端正語言不謇神農收為上品道書載其功能洵服食之佳品但令人腸滑得白朮並行為勝胡麻即黑芝麻除上述者外又能補肝腎能潤五臟虛風眩暈病後虛羸鬚髮早白產婦乳少常服之均有益麻油味甘性微寒無毒熟者利大腸下胞衣生者摩瘡腫生禿髮生者不宜過食脾虛作瀉者忌之粳米北粳涼南粳溫白粳涼紅粳溫晚稻得金氣多更涼得宇宙之沖氣養生人之後天色白而入肺清熱煮汁則止渴除煩新米動氣胃強者何礙陳廩沖淡脾虛者宜餐仲景白虎桃花竹葉石膏三湯並用之以清熱補不足也糯米味甘性溫釀酒則熱熬湯更甚脾虛最補肺寒可瘳大便既堅而小便又縮痘瘡雖發而自汗能收糯米雖大補脾肺寒虛但性極黏滯病人及小兒不宜多食粱名醫別錄分載黃梁白粱與青粱分述於下黃粱米味甘性平無毒益氣安中治痹止泄利小便除煩熱白粱米味甘性微寒無毒除胸膈熱益氣和中緩筋骨止煩渴青粱米味甘性微寒無毒補脾益胃補中益氣利小便止泄痢蘇頌云諸粱比之他谷最益脾胃又能利水益腎故名醫別錄謂青粱煮粥食之輕身長年粟米即小米味鹹性微寒無毒入脾胃腎三經補氣養腎開脾胃益丹田利小便而稱良治反胃與熱痢李時珍云粟之味鹹淡氣寒下滲腎之谷也腎病宜食之虛熱消渴泄痢皆腎病也滲利小便所以泄腎邪也降胃火而脾胃之病宜食之小麥味甘性平益心神養胃氣以淮產者為佳無壅滯生熱之慮有涼心潤燥之功故能治婦人臟燥浮麥即水淘浮起者除虛熱斂心津汗乃心之津液養心退熱津血不為火擾則可無自汗盜汗之慮矣黍米味甘性溫無毒入肺脾胃三經甘溫益氣補肺補中鵝口杖瘡均堪外用孟詵謂燒灰和油塗杖瘡止痛不作瘢李時珍謂嚼濃汁塗小兒鵝口瘡有效稷米味甘性寒無毒入脾胃二經安中益氣利胃宜脾涼血解暑闢除瘟疫補諸不足解苦瓠毒孫真人云稷脾之谷也脾病宜食之秫米味甘性微寒無毒入肺脾大腸三經利大腸治筋攣陽盛陰虛夜不得眠伍以半夏睡足神安亦可單用煮粥食之頗益人菰米一名茭米又名雕苽雕菰管子謂之雁膳味甘性冷質滑無毒入肺胃腎三經調腸胃除熱煩止渴滋口燥生津潤嗌乾咽喉患者食之滑利易於過關此即茭白所結之穎果如針狀作飯香脆荒年且可濟飢根名茭白詳見菜部另列專條薏苡仁味甘性微寒無毒入肺脾二經淘淨曬炒健脾益胃排膿除痹祛風濕理腳氣拘攣保燥金治痿癰咳嗽瀉痢不能缺也水脹其可廢乎薏仁得地之燥稟秋之涼能燥脾濕善祛肺熱大便燥結因寒轉筋及妊娠者並禁之芡實味甘性平無毒入脾腎二經補腎固精而遺濁有賴益脾養氣而泄瀉無虞使耳目聰明愈腰脊痠痛稟水土之氣以生獨於脾腎得力小兒不宜多食者以其難消也赤豆味甘酸性平無毒入心小腸二經利水去蟲一味磨吞決效散血排膿研來醋敷神良止渴行津液清氣滌煩蒸通乳汁下胞衣產科要矣除痢疾止嘔吐脾胃宜之赤豆心之谷也其性下行入陰分通小腸治有形之病消瘕散腫雖潰爛幾絕者為末敷之無不立效久服赤豆令人枯燥肌瘦身重以其行降令太過也綠豆味甘性寒入肝經反榧子殼惡鯉魚解熱毒而止渴去浮風而潤膚利小便以治脹厚腸胃以和脾綠豆屬木通於厥陰解毒之功過於赤豆但功在綠皮若去殼即壅氣矣胃寒者不宜食黑豆味甘性平無毒入腎經活血散風除熱解毒消水腫歷節能聰耳明目甘草與黑豆伍用能解百藥毒蓋甘草和中黑豆散熱又均能解毒也蘇頌云古稱大豆解百藥毒試之不然又加甘草其驗乃奇今以二藥加骨碎補治中毒耳聾得效扁豆味甘性溫無毒入脾經去皮炒補脾胃而止吐瀉療霍亂而清濕熱解諸毒大良治帶下頗驗色黃味甘得乎中和脾之谷也能化清降濁故有消暑之用皮如粟色者不可入藥傷寒邪熾者禁用花葉均對暑期瀉痢有益藤治轉筋豆豉見發散二釀造與調味及飲料飴糖味甘性溫無毒入脾經止嗽化痰千金方每嘉神效脾虛腹痛建中湯累奏奇功瘀血熬焦和酒服腸鳴須用水煎嘗飴糖雖能補脾潤肺然過用之反能動火生痰凡中滿吐逆酒病牙疳咸忌之白沙糖味甘性寒無毒入脾經生津解渴除咳消痰補脾緩肝和中潤肺中滿者少用紅沙糖味甘性寒無毒功用與白者相仿和血乃紅者獨長紅白二種皆蔗汁煎成多食能損齒生蟲作湯下小兒丸散者繆矣蜂蜜味甘性平無毒入脾經忌生蔥凡蜜一斤入水四兩磁器中煉去沫滴水不散為度和百藥而解諸毒安五臟而補諸虛潤大腸而悅顏色調脾胃而除心煩同薑汁行初成之痢同薤白塗湯火之瘡採百花之英合雨露之氣釀成其氣清和其味甘美虛實寒熱之正無不相宜也大腸虛滑者雖熟蜜亦在禁例酸者食之令人心煩同蔥食害人同萵苣食令人利下食蜜飽後不可食醋令人暴亡醋味酸性溫無毒入肝經澆紅炭而聞氣產婦房中常起死塗癰疽而外治瘡科方內屢回生消心腹之疼症積盡破殺魚肉之毒日用恆宜陳藏器曰多食損筋骨損胃損顏色食鹽味鹹性寒無毒入腎經擦齒而止痛洗目而去風二便閉結納導隨通心腹煩疼服吐即愈治疝與辟邪有益痰停與霍亂無妨潤下作咸咸走腎喘嗽水脹消渴大忌食鹽或引痰生或凝血脈或助水邪多食損顏色傷筋力故西北人不耐咸少病多壽東南人嗜咸少壽多病青鹽功用相同入肝散風胡椒味辛性大熱有毒入胃大腸二經溫中下氣消風去痰食積與快膈稱良腹痛與胃寒共治陰虛火旺之人忌用畢澄茄即胡椒之大者乃一類二種亦易僭上茶葉味甘苦性微寒無毒入心肺二經畏威靈仙土茯苓惡榧子消食下痰氣止渴醒睡眠解烤炙之毒消痔瘻之瘡善利小便頗療頭疼稟土之清氣兼得春初生髮之意故其所主皆以清肅為功然以味甘不澀氣芬如蘭為良茶稟天地至清之氣產於瘠砂之間專感云露之滋培不受纖塵之滓穢故能清心滌腸胃為振發之品昔人多言其苦寒不利脾胃及多食發黃消瘦之說此皆語其粗惡苦澀者耳故入藥須擇上品方有利益茶子研末吹鼻治頭腦鳴響酒味苦甘辛性熱有毒入肺胃二經通血脈而破結厚腸胃而潤肌宣心氣以忘憂助膽經以發怒善行藥勢可御風寒少飲則和血行氣壯神消愁過飲則損胃耗血生痰動火故沉湎無度醉以為常者輕則致疾重則亡身此大禹所以疏儀狄周公所以著酒誥也燒酒散寒破結損人尤甚三菜蔬薯蕷一名山藥味甘性平無毒入心脾腎三經蒸透用益氣長肌安神退熱補脾除瀉痢補腎止遺精山藥得土之沖氣稟春之和氣故主用如上但性緩非多用不效山藥與面同食不能益人尚有藤上之珠芽名零餘子另立專條零餘子味甘性平偏於溫無毒入肝腎二經即山藥藤上之珠芽俗稱山藥果子生曬乾切碎入藥若作食療煮熟去皮蘸糖食補脾益腎而重點在腎聰耳明目具防老之能強健腰部濟弱扶傾挽救虛損轉瘦為豐餒者啖之不飢老人食之駐顏陳藏器云零餘子功用強於薯蕷李時珍云勝於山藥美於芋子百合味甘性微寒無毒入心肺二經花白者入藥保肺止咳驅邪定驚耳聾耳痛百合諸病止涕淚多利大小便心主鎮定邪不能侵肺相清肅咳嗽可療涕淚肺肝熱也二便不通腎經熱也清火之後復何患乎仲景云行住坐臥不定如有神靈謂之百合病以百合治之是亦清心安神之效歟百合潤肺能通二便中寒下陷者忌之芋艿一名蹲鴟旁生小者曰芋子味甘辛性平質滑生則有毒入胃大腸二經寬胃下氣利腸通閉散結消瘰癧補中充肌膚止熱渴敷燙傷多食反能滯氣困脾患瘰癘者可常作食療慈姑又作茨菰味甘微苦性微寒無毒入肺肝二經清肺而止咳嗽痰血和血而治產後血悶須去皮煮熟食其葉又可作藥引風熱咳嗽方中加用一至三片為引有良效搗爛可塗丹毒茭白附茭草正名為菰又作菰菜茭筍味甘性冷質滑無毒入肺脾胃腎四經去煩熱利五臟開胃口通兩腸滋人齒除目黃茭白為菜蔬之一與鯽魚為羹能開胃口又能治咽中潰爛口舌生瘡茭草即菰葉日華諸家本草謂其利五臟紫菜味甘咸性寒無毒入肺經清煩滌熱化痰軟堅和血下氣開胃加餐治少寐利咽喉除腳氣醫咳嗽散結氣消癭瘤食療本草云若熱氣塞咽喉者汁飲之干嚼能治肺癰初起咳唾臭痰又能兼利小便蓴菜味甘性寒無毒入脾胃肝三經清胃脘之熱逆逐停聚之水濕降浮上之陽氣宜老人之服食消痰除煩解毒清熱安下焦調消渴此菜涼滑鮮美故張翰見秋風而動故鄉蓴鱸之思多食令人嗜睡故難寐之人佐餐有益以其質滑咽部欠爽利者用之亦宜蕨菜味甘性寒質滑無毒入心脾二經泄陽氣利水道降而不升靜而止燥令人入睡消除煩惱饑年代谷可以免夭氣壅經絡用之多效難以入睡或睡而不實多慮者常食此物有效香椿頭即椿之嫩芽味微苦性偏溫嫩芽瀹食祛毒消風李時珍謂椿葉無毒然亦不可多食木耳味甘性平入胃大腸二經利五臟和胃腸活血脈使血涼治出血醫痔瘡以楮槐榆柳桑五種樹上所生者為良常食有益葛仙米味甘淡性寒清神解熱清膈利腸能消痰火可醫夜盲亦作外治湯火燙傷為羹入饌鮮爽清香此為藻體商品中常夾有沙子宜撿淨再用韭菜味辛性溫無毒固精氣暖腰膝強腎之功也止瀉痢散逆冷溫脾之力歟消一切瘀血療喉間噎氣韭根搗汁去瘀血治反胃韭子固精生精助陽止帶古方用韭專治瘀血蓋酸入肝辛能散溫能下也多食則神昏目暗胡荽味辛性溫內通心脾外達四肢能辟邪惡最發痘疹酒煎掩頭面含噴遍身即發痘疹大蒜味辛性溫有毒入脾腎二經忌蜜消穀化食闢祟驅邪破痃癖多功炙惡瘡必效搗貼胸前痞格資外攻之益研塗足底火熱有下引之奇大蒜用最多功至捷外塗皮肉發疱作疼則其入腸胃而搜刮概可見矣性熱氣臭凡虛弱有熱之人切勿沾唇即宜用者亦勿過用生痰動火損目耗血謹之薤白味辛苦性溫質滑無毒入心胃大腸三經溫中散結下氣散血胸痹刺痛心痛宜食亦治久痢咽中哽骨輕身耐寒能補不足本草匯言謂陰虛發熱病不宜食生薑見發散蔥見發散金針菜見萱花下四瓜果冬瓜味甘淡性偏涼無毒入心肺脾大小腸五經清解暑熱利水消痰胸悶膈熱口渴心煩腫脹溲少濕困減餐暑期連皮子煮食頗能益人冬瓜皮利水消腫洗面去黑䵟冬瓜子清肺消癰治肺癰腸癰西瓜味甘性寒解暑除煩利水醒酒瓜性寒曝之尤寒稽含賦云瓜曝則寒油煎則冷物性之異也一味單行名天生白虎湯但多食傷脾助濕至秋易患瘧痢甜瓜略同絲瓜味甘性平無毒化痰涼血除熱利膈祛風解毒清上稱良鼻病齒患腮腫唇僵食之有益常用無妨固氣和胎孕產如常又能下乳母子安康根藤葉絡另有專條大棗味甘性平無毒入脾經堅實肥大者佳調和脾胃具生津止瀉之功潤養肺經操助脈強神之用經言棗為脾果脾病宜食之又曰脾病人毋多食甘毋乃相戾耶不知言宜食者指不足之脾也如脾虛泄瀉之類毋多食者指有餘之脾也如中滿腫脹之類凡用藥者能隨其虛實而變通之雖尋常品味必獲神功苟執而泥之雖有良劑莫展其長故學者以格致為亟也棗雖補中然味過於甘中滿者忌之小兒疳病及齒痛痰熱之人俱不宜食生者尤為不利紅棗功用相仿差不及耳青梅味酸性平既能止渴生津又可斂肺澀腸口渴咽乾乾咳少痰大便稀溏者以之作食療甚為有益附核仁除煩熱明眼目吳普本草謂其益氣不飢枇杷果味甘酸性平入肺胃二經利肺氣止吐逆治渴下氣主上焦熱能潤五臟此果主降能潤故咽喉不利口舌乾燥者用之甚宜梨味甘酸性寒無毒入心肝脾三經外宣風氣內滌狂煩潤肺涼心降火消痰熱嗽口渴失音咽乾人知其清火消痰不知其散風之妙生之可清六腑之熱熟之可滋五臟之陰初病連皮蒸食病七日以上者可去皮生食柿味甘性寒無毒入肺脾二經潤肺止咳嗽清胃理焦煩乾柿俗稱柿餅能厚腸而止泄主反胃與下血柿霜清心而退熱生津潤肺而化痰止嗽口瘡常發用此含之三者主用大同小異總之肅清上焦火邪兼有益脾之功也柿性頗寒肺經無火及風寒作嗽者冷痢滑泄者忌之不宜與蟹同食令人腹痛作瀉柿蒂止呃逆蘋果味甘酸半熟者味兼澀入胃腸二經止口渴治瀉痢此果尤宜於暑期腹瀉舌紅口渴者以用將熟味兼澀者為佳山楂味酸性平無毒入脾胃二經去核消肉食之積行乳食之停疝氣為殃茴香佐之而取效兒枕作痛沙糖調服以成功發小兒痘疹理下血腸風善去腥膻油膩之積與麥芽之消穀積者不同也核主催生疝氣按胃中無積及脾虛惡食者忌服無花果味甘性平入肺脾大腸三經清肺清腸和脾開胃咽喉疼痛聲嘶大便不調生痔此果有製為糖脯者便於啖食腸風下利固宜便秘亦可暢行乃調節大腸之食療佳品其葉煎湯熏洗可治痔瘡腫痛橘肉味甘酸性溫入肺胃二經潤肺開胃寬胸快膈橘絡理氣尤佳另有專條金橘餅味酸甘性平無毒入肝胃二經寬胸快膈降氣下氣咽喉覺阻食之爽利消滯醒酒均可解渴闢臭咸宜此餅能發胸中陳郁之氣食後上則噯氣中則腹鳴下則矢氣患者每覺有鬆快之感柚味酸性寒無毒入肺胃二經消食積去腸胃中惡氣解酒毒治飲酒人口氣妊婦口淡不思進食以之食療和暢胸膈柚皮味甘辛性平入肺胃二經消食快膈散憤懣之氣化痰止咳酒蜜浸之甚宜慄味甘性溫入胃腎二經益氣厚腸胃補腎治腰腳蘇子由詩云老去自添腰腳病山翁服慄舊傳方客來為說晨興晚三咽徐收白玉漿此得食慄之益故記之以歌訣也石榴味甘酸澀性溫無毒咽喉燥渴食之有益瀉痢帶下仗其酸澀咽喉紅腫劇痛以石榴汁點之可止龍眼味甘性平無毒入心脾二經補心虛而長智悅胃氣以培脾除健忘與怔忡能安神而熟寐血不歸脾莫缺思慮過度者宜不熱不寒和平可貴別名益智者為其助心生智也歸脾湯用為嚮導者五味入口甘先歸脾也道家用龍眼肉細嚼千餘待滿口津生和津汩汩而咽此即服玉泉之法也胡桃味甘性平無毒入肺腎二經佐補骨而治痿強陰兼胡粉而拔白變黑久服潤腸胃恆用悅肌膚通命門而理三焦治腰腳與心腹痛一幼兒痰喘五日不乳服人參胡桃湯喘即定明日去胡桃衣喘復作仍連皮服遂愈蓋皮有斂肺之功也但用一味空腹時連皮食之最能固精肺有痰熱命門火熾者勿服銀杏味甘苦澀性平有小毒入肺腎二經熟食有溫華蓋益氣定哮寧嗽縮小便止帶濁之功生用能塗䵟𪒟皶疱疥癬陰蝨防皴皺浣油膩之效銀杏確有小毒生食及熟者多食均易中毒小兒尤當慎之銀杏葉斂肺平喘能治咳喘而胸前痹痛巴旦杏又名叭噠杏味甘性平偏溫無毒入肺胃二經止咳嗽下氣消心腹逆悶此物可炒食一般不入煎劑松子味甘小溫無毒潤五臟補不足澤皮膚發不白燥咳停風眩默虛秘者宜常服潤燥通腸乃老年頤養之品也榛子仁味甘性平無毒入脾胃二經益氣力實腸胃調中進食令人健行此子食之益人但不必多食橄欖味酸澀甘性平無毒入胃經清咽喉而止渴厚腸胃而止瀉消酒稱奇解毒更異跡其主用約與訶黎勒相同誤中河豚毒惟橄欖煮汁服之可解諸魚骨鯁嚼橄欖汁咽之如無橄欖即以核研末急流水調服亦效核燒炭研末與冰片硼砂西瓜霜硃砂薄荷等為伍名鎖匙散治咽部紅腫局部不淨者吹之有良效以其能吸附垢物也榧子味甘性平無毒入肺經反綠豆殺百種之蟲手到而痊療五般之痔頻嘗則愈消穀食而治咳助筋骨而壯陽東坡詩云驅除三彭蟲已我心腹疾指其殺蟲也不問何蟲但空腹食榧子二十一枚七日而蟲下輕者兩日即下矣丹溪云榧子肺家果也多食則引火入肺大腸受傷蓮子味甘性平無毒入心脾腎三經泡去皮心心腎交而君相之火邪俱靖腸胃厚而瀉痢之滑脫均收頻用能澀精多服令人喜養神而氣力長治血而崩帶瘳蓮子脾家果也久服益人石蓮子乃九月經霜後堅黑如石墮水入泥者今肆中石蓮子其味大苦產廣中樹上不宜入藥另有蓮子心蓮花瓣蓮花須蓮房等均入藥用詳見蓮心條藕肉味甘性平入心脾二經忌鐵生用則滌熱除煩散瘀而還為新血熟用則補中和胃消食而變化精微藕性帶澀止血有功產婦忌生冷惟藕不忌為能去瘀故也另有藕節藕皮等俱能作藥用詳見藕節條荸薺味甘性寒無毒益氣而消食除熱以生津腹滿須用下血宜嘗同胡桃食能化銅物於烏有一味為末能闢蠱毒孟詵云有冷氣人勿食多食令人患腳氣孕婦忌之尚有荸薺粉商品稱馬蹄粉詳見附錄中甘蔗味甘澀性平無毒入肺胃二經下氣和中消痰快膈除心胸煩熱止嘔噦口渴除秋燥咳嗽去其皮嚼汁治發熱少津而小便赤澀與青粱米同煮能潤人心肺蔗皮燒研摻小兒口疳甚效五動物烏骨雞味甘咸性平無毒入肺腎二經最闢妖邪安五臟善通小便理煩蒸產中亟取崩帶多求雞為陽禽屬木應風在卦為巽其色有丹白黃烏之異總不如白毛烏骨翠耳金胸為最上乘也鴨味甘咸性平無毒入肺腎二經流行水腑滋陰氣以除蒸闖達金宮化虛痰而止嗽類有數種惟毛白而烏嘴鳳頭者為虛癆良藥白屬西金黑歸北水故葛可久治癆有白鳳膏也鳧即野鴨味甘性溫益氣補中平胃消食治水腫與熱毒療瘡癤而殺蟲雀卵味酸性溫無毒入腎經益氣力補髓精乾道衰微陽事難興坤元素弱宮冷不孕挽饑年之浮腫返老者之頹齡雀屬陽而性淫故強壯陽事下元有真陽謂之少火火衰則陰痿精寒火足則精旺陽強雀卵之於人火矣哉陰虛火盛者勿食不可同李食服術人亦忌之燕窩味甘性平入肺脾胃腎四經養陰潤燥益氣補中虛損癆瘵咳嗽痰紅久病傷脾憔悴不榮補而不燥潤而不滯入腎滋水入肺壯氣入胃加餐無往不利虛人老人常食均有效益黃牛肉味甘性溫無毒入脾經補脾開胃益氣調中牛乳有潤腸之美牛喉有去噎之功牛為稼穡之資不輕屠殺自死者食之損人羊肉附羊肝羊膽味甘性溫無毒入脾腎二經反半夏菖蒲忌醋補中益氣安心止驚宣通風氣起發毒瘡角堪明目殺蟲肝能清眼主翳腎可助陽血能醫傷東垣云補可去弱人參羊肉之類是已凡形氣痿弱虛羸不足者宜之羊血又主產後血暈悶絕生飲一杯即活中砒磠鍾乳礬石丹砂之毒者生飲可解羊食毒草凡瘡家及痼疾者食之即發宜忌之羊肝明目去翳目患者冬季常食有益羊膽能明目夷堅志有二百味草花膏即羊膽與蜜同熬而成蓋取羊食百草蜂採百花而得名也豬脊髓味甘性平無毒補虛癆之脊痛益骨髓以除蒸心血共硃砂補心而治驚癇豬肺同薏苡保肺而蠲咳嗽䐗本益脾可止瀉而可化症腎仍歸腎能引導而不能補益豬水畜也在時屬亥在卦屬坎其肉性寒能生濕痰狗肉味鹹性溫無毒入脾腎二經反商陸畏杏仁惡蒜暖腰膝而壯陽道厚腸胃而益氣力屬土性溫故能暖脾脾暖則腎亦旺矣黃犬益脾黑犬補腎他色者不宜用也以其能暖腰膝故風寒濕痹患者可常食之鯉魚味甘性平下水氣利小便喘嗽腳氣腫脹黃疸劉河間曰鯉之治水鳧之利水所謂因其氣相感也鯽魚味甘性溫諸魚屬火獨鯽屬土忌麥冬芥菜沙糖豬肝和足陽明實手陽明運就下水制氾濫水可和胃實腸而又能行水者以性獨屬土而自能制水也鰻鱺亦名白鱔味甘性平煮食補虛損燒煙燻蚊蟲能去風又闢蛀風瘙陰癢濕痹骨蒸張鼎云其骨燒煙蚊化為水熏竹木闢蛀蟲置衣箱闢諸蠹鱔魚俗稱黃鱔味甘性溫無毒補中益血逐風除痹產後失調食療甚宜血可塗口眼歪斜海參味鹹性偏溫入心肺脾腎四經降火滋腎通腸潤燥精血虧損怯弱虛勞補養肺陰免於短夭陽事難興常餐得效清燉食之對虛人有益淡菜味甘性平偏溫無毒潛陽益人補五臟理虛勞潤毛髮消癭氣吳鞠通先生於小定風珠方解中曾云淡菜生於鹹水之中而能淡外偶內奇有坎卦之象能補陰中之真陽其形翕闔故又能潛真陽之上動李時珍本草綱目引阮氏云淡菜生海藻上故治癭與海藻同功本品與冬瓜同煮食味尤美蟶味甘性溫無毒煮軟作羹湯補虛主冷痢去胸中邪熱煩悶治婦人產後虛損商品俗稱蟶乾作湯頗為鮮美寓藥於食能消疾病於無形蟶殼置瓦上日曬夜露待色轉白漂淨為末同冰片成散吹咽中治喉風急症蟹味鹹性寒有小毒畏紫蘇大蒜木香忌柿和經脈而散惡血清熱結而續筋骨合小兒之囟解漆毒之瘡性寒能發風能薄藥力孕婦不宜食爪能墜胎附錄一澱粉類食療品葛粉即葛根中之澱粉味甘性平無毒入胃經為止渴生津之食療佳品宋寇宗奭謂冬月取生葛搗爛入水中揉出粉澄成垛入沸湯中良久色如膠其體甚韌以蜜拌食查葛根製為粉食由來已久唐陳藏器即謂作粉尤妙宋蘇頌亦謂今人多作粉食風藥多燥唯葛根獨潤作粉則性更和緩食醫心鑑治煩躁熱渴即以葛粉與粟米同煮食又治小兒壯熱嘔吐亦以葛粉水調糜飲和食余家治諸般咽喉症每囑患者食此少加糖或蜜調服味甚甘美可起清熱止痛止嘔之作用余曾用葛粉作賦形劑將鎖匙散製成含片有易於結合及崩解之特點頗便於應用藕粉宦遊筆記謂淮以南皆澤國居人蒔藕濾為粉淘汰既淨去其渣滓存其甘液風吹日曝漸成碎珠以湯沃而食之別有風味亦野物之可尚者矣尤著名者曰片粉擇藕之極佳者淘曬人工十倍尋常及其既成則如白雪片片纖塵不染味亦絕勝明朱權臞仙云藕搗浸澄粉服食輕身益年本草綱目拾遺謂其味甘氣芬芳性平調中開胃補髓益血通氣分清表熱常食安神生智慧解暑生津解渴止瀉藕節也可以搗澄取粉本草綱目拾遺謂其味甘微帶苦性平開膈補腰腎和血脈散一切瘀血生一切新血產後及吐血者食之尤佳藕粉質滑易於下咽又能止血養陰開胃生津故用於喉證最宜其果實蓮子研磨成粉即為蓮子粉味甘性平無毒入心脾腎三經本草經謂其補中養神益氣力除百疾日華諸家本草謂其多食令人歡喜新修本草謂其輕身益氣令人強健本草蒙筌謂其安靖上下君相之火邪明李時珍謂其交心腎厚腸胃固精氣利耳目根據以上諸說虛損喉症如咽喉結核等或兼神志之病用之均宜一般咽喉病而兼心腎脾胃不足者用之亦頗為適合荸薺粉荸薺載於名醫別錄原名烏芋以其根如芋而色烏也爾雅名之為鳧茈以鳧喜食之也又以音近而轉為鳧茨葧臍宋鄭樵通志則作地慄蓋亦取其形似也其地下塊莖淘製成粉則為荸薺粉味甘性微寒質滑無毒能入肺胃腸諸經為清熱化痰之品唐孟詵謂其除胸中實熱氣蘇頌謂其厚人腸胃不飢能解毒食規謂可治傷風失聲余家治咽痛失音用荸薺粉加糖開水沖調頻服咽喉及食道腫瘤湯水難下調粉食之可以易下咽喉腐塊難退或角化如珠難以剝脫者可用荸薺粉伍硼砂等作吹藥本品又是眼科去翳之妙品菱粉即菱肉所制之粉也朱權云搗爛澄粉食補中延年本草綱目拾遺謂能補脾胃益氣健力耐飢行水祛暑解毒強腳膝余家遇老年而患慢性咽喉病出現衰弱症狀者每勸其間服菱粉確具有強健之功芡粉即芡實所制之粉也唐蘇敬謂作粉食益人勝於菱也養余月令謂其益精氣強智力靈耳目固精添髓余家治喉症之慢性而兼虛損者如便溏遺精帶下等每賞用之喉蛾又兼關節疼痛屢屢發作者亦宜之孫升談圃謂人之食芡必咀嚼之能使華液流通轉相灌溉其功甚於乳石也余每遇咽痛口乾之患者多使其嚼之能令滿口津生庚子余於役酒泉每晚必嚼服十數粒覺其確有殊功山藥粉山藥原名薯蕷後因唐代宗名預避諱改為薯藥至宋英宗名署遂又改為山藥味甘性平無毒本草經則謂其小溫入心脾腎三經為補益脾腎藥亦可補心安神研磨成粉調成糊狀加糖食之余家每用此於喉症之調理善後單用而量大其力更專其效更顯山藥藤上所結之珠芽名零餘子味甘性溫無毒入心脾腎諸經為強壯補腎藥陳藏器謂其益腎強腰腳補虛損食之不飢李時珍則謂其勝於山藥美於芋子研磨成粉可供食療余家經驗山藥重在補脾此物重在補腎故腎虛所致之頭眩耳鳴腰痠腳弱或兼有咽痛者則必用之百合粉由百合研磨而成味甘性平無毒入心肺二經能滋養五臟益陰安神潤肺止咳除熱利尿舉凡心虛少寐精神不寧肺虛乾咳甚或吐血陰虛熱渴及脾腎失健浮腫小便不利等用之均有益名醫別錄曾謂其治喉痹蓋指後期而言隨息居飲食譜謂其上理咽喉余家於喉痹喉癰白喉喉痧等病後陰虛或兼神志欠寧咳嗽浮腫者均用之每仿金匱要略百合病諸方依其需要適當加入地黃知母滑石等或伍以玉竹天冬麥冬石斛等山丹即百合之開紅花者主治略同但其補力稍遜以之入喉科方亦甚相宜隨息居飲食譜云清營滌暑潤燥通腸或蒸或煮亦可澄粉益人注第二行之喉痹應作急症關下喉痹橡子粉由橡子研磨而成味苦性微溫無毒入脾胃腎諸經是代食品也是收澀藥列子說符有夏食菱芰冬食橡慄之記載唐代大詩人杜甫在乾元中寓居同谷縣作歌七首中也提到拾橡慄唐孫思邈謂其非果非谷而最益人令人強健不飢日華本草謂其煮食止飢御歉歲李時珍謂其如老蓮肉山人儉歲採以為飯或搗浸取粉食以上均是代食之記載至於如何食法應當以水多次泡浸淘去其澀味蒸熟食之或磨粉食之亦有磨成漿汁過濾後取其沉澱曬乾成粉應用者其未沉澱部分還可以做涼粉或類似豆腐的食品在治療方面概括言之澀腸止瀉兼可固精咽痛而伴有慢性腹瀉的患者溫燥非其所宜以橡子粉加糖沖調服用平易而效宏又咽喉結核與腸結核並見且兼遺泄或帶下者亦宜用之以上所舉粉類食品合而言之均能治療咽喉諸症析而言之則又有所區別大抵葛粉走表荸薺粉清痰藕粉和中菱粉蓮子粉百合粉山藥粉零餘粉均可補中然又各有側重藕粉蓮子粉百合粉山藥粉均能調和情志然藕可除煩蓮令人喜百合定驚山藥安神芡粉橡子粉雖均達下焦而起收澀作用然芡之重點在前陰橡之重點在後陰若依病期而言則葛粉宜於早期發熱或嘔吐者非但不忌且宜頻服後期口渴者用之亦無忤荸薺粉亦宜於早期後期痰熱仍重者用亦無妨山藥粉百合粉均宜於後期菱粉則宜於後期及慢性病患者蓮子粉芡粉零餘粉並宜於病後橡子粉則宜於慢性病而腸滑者藕粉則先後咸宜乃通用之品二談中藥的變通使用中藥的資源相當豐富中藥的品種相當繁多我國疆域廣大過去由於交通的不便儘管是甲地易得之品往往乙地又有一時不濟現象再則有些藥材本身就是很稀少的東西所以古代醫家便想出種種解決的方法來不但作為權宜之計而且形諸筆墨留給後人參考考中藥代用之法由來已久張仲景稱無豬膽以羊膽代之又說無膽亦可用金匱雜療方治飲食中毒方用苦酒而方後云或以水煮亦得仲景以後方書類此者又層見不窮今將此類資料梳剔整理述其要者歸納成類供從事中醫中藥者之參考限於地域的變通使用植物本事方引柳柳州纂救死方用橘葉注云北地無葉以皮代之又聖濟總錄治乾腳氣之杉節湯亦用橘葉注云皮亦得當是考慮北地使用之故水類千金方風眩薯蕷湯用江水注云秦中無江水處以千里東流水代之又瑣碎錄治痔漏以海水煎湯熏洗注云入鹽煎亦得蘇沈良方治腸痔用河水注云井水亦得雞峰普濟方及聖濟總錄均有同樣記載照顧少數民族習慣的變通使用古方中變通使用之法頗有可供少數民族地區醫療工作之參考者特輯為一類其最初立方雖不必因此而設但是能以啟發吾輩俾得觸類旁通千金方肺虛寒門用豬胰注云無豬胰以羊胰代聖惠方治婦人乳癰方以豬膽汁調服注云以醋漿水服之亦得聖濟總錄摩傅神明膏用豬膏注云以牛酥代豬膏亦佳聖惠方治頭瘡方用豬脂調塗注云用麻油調亦可季節性的變通使用冬雪夏水魏氏鼻衄奇效散須頻用雪塊熨藥上注云無雪只冷水掃保幼大全治㿉瘡用雪水以雪水須預藏故注云無雪水用新水冬根夏葉博愛心鑑謂水楊春冬用枝秋夏用葉備急方療口中及舌上生瘡方用薔薇根注云冬用根夏用枝葉聖惠方治婦人乳癰方用蔓菁葉注云冬無葉即用根也冬用乾者古今錄驗蘇子湯用蘇子及生蘇葉注云冬天煮乾枝莖葉亦佳千金方妊娠尿血方用生艾葉注云冬用乾者鮮貨與乾貨的變通使用干代鮮聖惠方治難產方益母草搗汁三合如無生者用乾者一握以水煎服聖濟總錄治舌上出血清心散用刺薊研絞取汁注云如無生汁只搗乾者為末冷水調下又治小兒脾熱方用桑根白皮取自然汁注云如無新桑根白皮取干桑白皮細銼水煎乾薑代生薑文獻極多如深師方五味子湯古今錄驗桂心湯等均是鮮代干肘後方治篤病新起早勞方用干蘇注云無干者生亦可用分兩須有變動本草新編云蒲公英百斤無鮮草可用乾者干則不必百斤三十斤便可熬膏取七斤也全嬰方論有云如無生地黃只用乾地黃每乾地黃五兩當生地黃一斤以上為干須減量之例直指方腸癰四聖散中有生栝蔞一枚注云若干栝蔞則用兩枚又是干須加量之例不同部份的變通使用這一類的文獻很多各舉一二例恕不詳引根代葉是齋百一選方治小兒走馬疳用芭蕉杆或葉注云無即用根根或根皮代花小品方茅花湯云若無茅花取茅根代之亦可又傷寒百問歌治鼻衄方云無茅花可以茅根代之婦人良方療婦人乳癰方以芙蓉花研爛注云若無花只取根上皮先用竹刀刮去粗皮但用內一層嫩白皮研爛經驗秘方仙方香連丸用葛花注云無葛花以葛粉代之葛粉乃葛根中之澱粉也根代子證類本草黃蜀葵條引經驗後方用黃蜀葵子注云如無子以根細切煎汁令濃滑待冷服側根子根代主根母根古今錄驗牡丹丸中用烏頭注云無烏頭附子亦可炮用之又方氏家藏方健脾散亦以附子代烏頭莖葉代子澹寮方苦參圓蒼耳子無則以莖葉代用聖惠方治齲齒方用葫蘆子注云莖葉亦可用苗葉子代瓜聖濟總錄消渴竹龍散用冬瓜注云無冬瓜用冬瓜苗葉子煎湯俱可枝代果子聖惠方治妊娠霍亂轉筋方用木瓜注云如無木瓜煎枝亦佳聖濟總錄胞衣不出槐子湯注云如無槐子用枝莖葉代花外科精要金銀花散注云無花用苗葉嫩莖代之花代根葉子直指方瞿麥湯如無茅根只用茅花聖濟總錄肝藏風毒天麻湯用甘菊葉注云如無葉以花代揚氏紫草散用紅花子注云如無紅花代之子代葉花肘後備急方療小兒蠼螋瘡方用蒺藜葉注云無葉子亦可婦人良方催生葵子散用黃蜀葵花注云無花時只用葵子核代果朱氏集驗方治骨鯁方用橄欖注云若無橄欖核燒為炭亦可骨代臟千金翼方補虛勞方用羊心肺肝肚腎注云若無羊五臟羊骨亦可用之角代茸壽親養老書中有鹿茸方注云如無以鹿角屑代之亦妙同類品的變通使用同稱異物葉氏錄驗有用葵葉方注云如無葵葉蜀葵子亦得同物異稱婦人良方舒經湯云無薑黃用嫩莪朮代之同是油類外科精要白龍膏用杏子油注云芝麻油亦可同類而易得活人事證後集糜茸圓注云無糜茸以鹿茸代活幼口議暖金丹無牛黃以黃牛膽代加用功效相似的變通使用療風千金翼方秦王續命大八風散用牡荊子注云若無用柏子仁代潤燥養陰活幼口議黃耆散用天門冬注云麥門冬亦得保肺聖濟總錄咳嗽百部煎用生百合汁注云如無以藕汁代寧心魏氏小兒安神圓用琥珀注云如無琥珀以茯神代之風痹朱氏集驗方獨活寄生湯注云無桑寄生則以川續斷代除痰衛生家寶中暑地榆奪命散用牛膽制天南星注云如無以法制半夏代之解熱經心錄漏蘆湯用白薇注云如無則用知母衛生寶鑑地仙丹用青蒿注云如無則用竹葉止血傷寒蘊要及醫碥生地黃湯均用生藕自然汁無藕則用刺薊汁再無則用刺薊末活血千金方之遠志湯茯苓湯白芷圓內補當歸湯及外臺秘要引深師溫脾丸均以川芎代當歸退黃醫宗金鑑於麻黃連軺赤小豆湯下注云無梓皮以茵陳代之下氣壽親養老書云如無烏藥用厚朴亦得蘭臺軌範引局方藿香正氣散注云大腹皮換檳榔亦可溫中肘後方治心腹痛方云無桂用乾薑亦佳通下經心錄漏蘆湯云無大黃用芒硝利水千金方甘草圓有澤瀉注云無澤瀉以白朮代之溫腎活人事證十柔圓有蓯蓉注云無以鹿茸代之調經婦人明理方謂丹參一味主治與四物相同外用治湯火傷聖惠方治湯火所灼方用柳白皮注云用柏白皮亦佳代用其一兩種功效前一類是治療功效大致相若的即某某可代某某這一類是僅代其一兩種功效的如茯苓代人參定心則可代其它功能即不適宜具體材料仍分數類列下定心千金翼方淡竹茹湯亦見千金但敘述較略注云若有人參內一兩若無人參內茯苓一兩半亦佳人參茯苓皆治心煩悶及心驚悸安定精神有即為良除煩廣濟方血氣煩悶方用生藕注云竹瀝亦得發血中之表張文仲療晚發傷寒方用地黃注云無地黃用豉一升溫病條辨謂生地能發血中之表此用豆豉亦代其發表也止血兼化瘀千金方白芷圓注云無續斷以大薊根代之大薊根僅代續斷之止血化瘀作用其它不能代也下氣聖濟總錄小兒吐逆丁香湯用花桑葉注云如無則以枇杷葉代宣中朱氏集驗方仙茅散注云無仙茅則以好蒼朮代之牙疼魏氏薑黃散注云偶無薑黃檢本草云川芎亦治牙疼遂以代之解毒千金方傷寒木香湯內有犀角注云無犀角以升麻代之應急的變通使用聖濟總錄蘇合香丸注云倉猝求人參不得只白湯亦佳同上治傷寒狂躁大安丸注云如緩急無地黃汁新水化下魏氏中風木香附子湯注云附子炮去皮臍若急中不炮肘後方救猝死方破白犬以覆心上注云無白犬小雞亦佳降格以求甚至缺之亦可地道問題朱氏集驗方木瓜敗毒散注云無宣瓜尋常木瓜亦可品種問題千金方治黃疸方用小麥苗搗絞取汁注云無小麥苗野麥苗亦得範注云用小麥勝也大小廣濟方下乳汁用栝蔞須青色大者注云若無大者用小者兩枚又聖濟總錄腳氣木瓜丸用木瓜大者一枚注云小者兩枚亦可顏色廣濟方下乳汁用栝蔞須青色大者又注云無青色者黃色者亦好觸類旁通衛生家寶紫金丹中用鹿脊骨注云以羊脊骨代之亦得直指方吐血地黃煎用鹿膠注云無鹿膠以透明阿膠代用方氏家藏方王醫師麝香鹿茸圓用鹿角膠和丸注云如無鹿角膠蜜和亦得廢物利用肘後方治霍亂方注云無新藥煮滓亦得缺之亦可幼幼新書引嬰孺黃耆散注云若無黃耆可缺也濟生方五香連軺湯注云桑寄生無真者寧缺之施氏續易簡方丁附湯注云急切無丁香亦得又肘後方治水病方亦云無蘇合可缺之也結語以上就已有材料分為十類古人有言世無難治之病有不善治之醫藥無難代之品有不善代之人觀於上引種種可悉變通使用亦是一門學問靈活而不呆板辨證而不機械若能通盤掌握豁然於胸自可隨機應變中醫診療之特點在於辯症論治理法方藥自有其規矩繩墨然法有定而方藥無定立法既准使用何藥可以廣為選擇所以不憚辭費而廣徵博引者意在多所啟發廣我思路俾臨症使用時之靈活變通耳若不加變化目其為固定不移認為某某等於某某恐終將行之鮮效則又非演述者落筆之本意也從上引材料里可以反映出祖國的藥用資源是極其廣泛的過去的醫務工作者在向疾病作鬥爭的過程中是有其豐富經驗的就所錄各條來看有很多代用之品並未載於本草書溫習此項材料可以廣開思路對於擴大藥源並充分的利用原有藥材來說會有一些參考意義近年來各地民間貢獻出許多單方草藥編纂了許多草藥方書在群眾的防病治病方面在城鄉的保建醫療方面都發揮了巨大的作用三煎藥水火之應用李時珍云凡服湯藥雖品物專精修治如法而煎藥者鹵莽造次水火不良火候失度則藥亦無功觀夫茶味之美惡飯味之甘餲皆繫於水火烹飪之得失即可推矣余家對於煎藥之水火特加註意雖不必拘泥然在可能範圍內講究之則能增加藥效故於本草徵要之末特附水火二項以備臨症之參考煎藥用水天水雨水即天上落雨之水揚州俗稱之為天落水又可細分數種春水即立春以後落雨而得虞搏醫學正傳謂立春節雨水可以煮中氣不足清氣不升之藥李時珍謂其可煎發散及補中益氣藥潦水潦說文雨水大貌曲禮有水潦降之說韓退之詩潢潦無根源李時珍謂降注雨水謂之潦又淫雨謂之潦實即是指大雨與久雨所得之水余家則以伏天暴雨之水稱為潦水但梅雨亦作黴雨之水則不取芒種後逢壬為入梅小暑後逢壬為出梅傷寒論麻黃連翹赤小豆湯即用潦水成煎無已謂其味薄不助濕氣而利熱李時珍則謂其甘平無毒宜煎調脾胃去濕熱之藥液雨水李時珍云立冬後十日為入液至小雪為出液得雨謂之液雨亦曰藥雨又謂宜煎殺蟲消積之藥李時珍又於節氣水項下詳為敘述云立春清明二節貯水宜浸造諸風脾胃虛損諸丹丸散及藥酒久留不壞寒露冬至小寒大寒四節及臘月水宜浸造滋補五臟及痰火積聚蟲毒諸丹丸並煮釀藥酒與雪水同功端陽日午時水鑑案餘十餘歲時曾一遇之端陽午時忽降暴雨先父立命檢查本草綱目及本草綱目拾遺加以研究李時珍謂其宜造瘧痢瘡瘍金創百蟲蠱毒諸丹丸趙學敏謂五月五日雨剖竹得水可刷治汗癍小滿芒種白露三節內水造藥釀酒醋一應食物皆易敗壞人飲之亦易生脾胃疾雨水除梅雨之水不宜煎藥外其它時間者皆可用但宜新不宜陳取水之法可於雨時張潔淨布兜下承以盆桶亦可就瓦屋檐溜取得須待落雨兩小時以後者方可用否則檐瓦未經沖洗盡淨多含雜質且必先貯於桶待其沉清再倒入缸內徹去桶底之渣備用以之煎茶煮飯均甚宜人較之江河湖池之水為優比之井水則更優雨水不宜用鉛桶鉛盆貯存因雨水是軟水能溶解氧具有腐蝕性質若貯之能將鉛溶於水中於人不利露水趙學敏謂露本陰液夜則地氣上升降而為露其性隨物而變余家煎藥及製藥所用露水計取二種分述於下荷葉露趙學敏謂夏日黎明日將出時將長勺坐碗於首向荷池葉上傾瀉之以伏露為佳秋露太寒花上者性散有小毒勿用又謂味甘明目寬中解暑利胸膈下水膨氣脹又謂露本養陰扶陽又得荷葉之清氣故能奏功如此余家制眼藥用荷葉露內服亦有明目之功咽喉不利之患者久久不愈疑慮重重胸膈欠舒者每令其清晨自取荷葉露煎藥往往得滿意之效果稻葉尖上露趙學敏謂諸草木皆須天露始潤惟稻至酉時其根上津潤之氣漸升入夜乃達葉尖至曉復自上而降於根故無露之夜稻葉獨潤陳翠虛詞一些珠露阿誰運上稻花頭是也先六伯祖光奇公每用此以治虛損之盜汗有良效蓋以其既可自升自潤又能自降自收也秋燥咽乾者用此亦有良效雪水味甘性冷無毒陳藏器謂其解一切毒治天行時氣瘟疫吳瑞謂其煎茶煮粥解熱止渴李時珍謂其宜煎傷寒火熱之藥按雪水適應之症多見於晚春長夏秋燥之時落雪季節使用之機會反不多故須預貯且須使用者即醫者每年儲存余家治喉痧及白喉之毒火燔灼者每用雪水煎藥頗能得滿意之效果或以之烹茶飲之覺有沁人心脾之感地水活水即流水又稱千里水東流水流水乃對止水而言活水乃對死水而言朱熹詩有源頭活水來蘇東坡詩活水還須活火烹故余家稱之以活水李時珍云流水者大而江河小而溪澗皆流水也其外動而性靜其質柔而氣剛與湖澤陂塘之止水不同然江河之水濁而溪澗之水清復有不同焉陳藏器謂千里東流二水皆堪盪滌邪穢煎煮湯藥江河之水汲取後必澄清而後用之溪澗之水多屬山泉須選擇使用總之活水煎藥較諸池塘之水及井水為優逆流水與急流水亦屬活水範疇虞搏醫學正傳云逆流回瀾之水其性逆而倒上故發吐痰飲之藥用之急流水湍上峻急其性急速而下達故通二便風痹之藥用之寇宗奭謂東流水取其性順急速通膈下關也倒流水取其洄旋流止上而不下也李時珍謂逆流水主治咽喉諸病余家治咽喉病喜用逆流水若兼關節腫痛者則用急流水然須視條件之許可而用之不必拘拘或帶勉強也甘瀾水一名勞水李時珍云勞水即揚泛水張仲景謂之甘瀾水用流水二斗置大盆中以杓高揚之千萬遍有沸珠相逐乃取煎藥蓋水性本寒而體重勞之則甘而輕取其不助腎氣而益脾胃也又謂主五勞七傷腎虛脾弱陽盛陰虛目不能瞑陳藏器則謂病後虛弱揚之萬遍煮藥最驗余家治喉病之慢性屬虛而嘈雜少寐者每用之又可和蜜揚之效更佳井水一稱井華水汪穎謂井水新汲療病利人平旦第一汲為井華水凡井水有遠從地脈來者為上有從近江湖滲來者次之其城市近溝渠汙水雜入者氣味俱惡不堪入藥食茶酒也又論及不得已而用之時謂用須煎滾停一時候鹼澄乃用之李時珍謂其須取其土厚水深源遠而質潔者食用可也虞摶謂其宜煎補陰之藥李時珍謂其宜煎一切痰火氣血藥掌禹錫謂凡飲水療疾皆取新汲清泉不用停汙濁暖非直無效亦且損人總之煎藥用者井水不若活水更不若天水尚有簡易作外治之數法附錄於下備參嘉祐補註本草謂其治口臭新汲水則下魚骨哽此二法皆出自肘後方前者取水一杯合口向水張口取水氣哽當自下後者則正旦含井華水吐棄又直指方治飲酒齒痛井水頻含漱之皆簡便易行可以試用煎藥用火蘆火與竹火蘆即蘆柴竹即以竹劈之成塊而代薪李時珍謂其宜煎一切滋補藥又謂火用陳蘆枯竹取其不強不損藥力也吾鄉普遍以蘆柴作炊薪故用之煎藥既便而易行又能保證藥之質量稻麥穗火趙學敏謂麥穗火煮飲食主消渴咽乾利小便稻穗火烹煮飲食安神利五臟六腑余家治肺燥嗌乾咽痛者喜用麥穗火咽喉不利而兼神志欠寧者則用稻穗火均有裨益產米之鄉二者皆不難致若在北方則稻穗得之不易余嘗逆旅於北京頤和園附近周圍皆是稻田亦曾介紹病家用之因捶手可得也桑柴火抱朴子謂一切藥不得桑煎不服桑能助藥力除風寒痹諸痛李時珍謂凡一切補藥諸膏宜此火煎之又謂桑木能利關節養津液得火則拔引毒氣而祛逐風寒此雖指炙法而言然亦可作煎藥用桑柴之參考又於木部桑枝之下注云煎藥用桑者取其能利關節除風寒濕痹諸痛也觀靈樞經治寒痹內熱用桂酒法以桑炭炙布巾熨痹處治口僻用馬膏法以桑鉤鉤其口及坐桑灰上皆取此意也余家治喉蛾而兼痹症者每介紹病家以桑柴煎藥煎絡石防風營柳湯即指明用桑柴火雖屬遵循李氏之說然亦於實踐中證明其確有裨益炭火在昔煤炭未曾普通使用前取暖燉食煎藥熨衣大都皆用木炭李時珍謂櫟炭火宜煅煉一切金石藥烰炭火宜烹煎焙炙百藥丸散又謂櫟炭取其力緊烰炭取其力慢總之炭火煎藥既便於掌握火候又不致影響藥力宜採用至煤炭煎藥及煤油爐煎藥則不相宜尤其煎喉症之藥更不相宜以上附錄三則均是耿鑑庭講解耿引循記錄
