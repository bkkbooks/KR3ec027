body:
  text: 第一卷通治部分發散藥退熱藥一溫散風寒紫蘇味辛性溫無毒入肺經其氣芳香其性和融溫中達表散風解凝發表而不優於峻性陽而無損於陰通鼻塞行氣滯虛人需發汗而弱不能投者當以人參為伍暑期受寒涼用辛熱而於時有侮者可與藿香同行梗能下氣安胎胎元復固子可消痰定喘喘息安寧此藥溫能散寒香可和氣譬諸盛德之人可無往而不利若與橘皮同用尤為適宜治受暑之藿香正氣散治腳氣之雞鳴散均作如此配伍又可外治孕婦嘔吐不止以梗葉煮水嗅吸其蒸氣能止逆下氣可得平復尚能解蟹毒防風味甘性溫無毒入肺小腸膀胱三經畏萆薢惡乾薑芫花殺附子毒色白而潤者佳散風解表止痛醫瘡清咽喉及口齒治風疹與搔癢頭目中滯氣經絡中留濕俱可療也骨節之煩疼四肢之攣急均能解之能御防外風故名防風乃風藥中潤劑也瘡科多用之為其風濕交攻耳張元素謂其為手足太陽經之本藥王好古又謂其行足陽明太陰二經為肝經氣分藥又謂錢仲陽瀉黃散中倍用防風者乃於土中瀉木也日華諸家本草謂其勻氣脈乃經驗之談荊芥味辛性溫無毒入肝經反驢肉無鱗魚河豚蟹黃鱨魚散風邪清巔頂利咽喉透麻疹化瘀血消瘰癧理瘡瘍破聚結長於治風又兼治血何也為其入風木之藏即是血海故能並主風在皮裡膜外者宜之蔥白味辛性平入肺胃二經忌棗蜜犬雉肉通中發汗頭疼風濕總蠲除利便開關腳氣奔豚通解散專攻喉痹亦可安胎傷寒寒熱皆宜面目浮腫亦治蔥味最辛肺之藥也故解散之用居多多食蔥令人神昏發落虛氣上衝生薑味辛性熱無毒入肺胃二經生能發表熟可溫中開胃有奇功止嘔為聖劑氣脹腹疼俱妙痰凝血滯皆良刮下姜皮脹家必用凡中風中暑中氣中毒中惡霍亂等一切卒暴之證用薑汁和童便服之薑汁能開痰童便能降火也古方以薑茶治痢熱痢留皮冷痢去皮大妙忌服同乾薑桂枝味辛甘性溫入心肺膀胱三經助陽散寒溫經通脈達營衛和表裡無汗能發有汗能止理心腹之痛搜關節之痹橫行而為手臂之引經直行兼為奔豚之嚮導本經疏證云和營通陽利水下氣行瘀補中為桂枝之六大功效麻黃味苦性溫無毒入心肺膀胱大腸四經厚朴為使惡辛夷石葦去根節水煮去沫去營中寒氣泄衛分風邪發汗仗其溫散消腫在其行水既主用於實喘亦伍用於痛痹輕可去實為發散第一藥惟在冬月真有寒邪在表者宜之或非冬月或無寒邪或寒邪在裡或傷風等證雖發熱惡寒不頭痛身疼而拘急六脈不浮緊者皆不可用雖可汗之證亦不宜多服汗為心液若不可汗而汗與可汗而過汗則心血為之動矣或亡陽或血溢而成大患可不慎哉麻黃乃太陽經藥兼入肺經肺主皮毛葛根乃陽明經藥兼入脾經脾主肌肉發散雖同所入迥異細辛味辛性溫無毒入心小腸二經惡黃耆山茱萸畏滑石反藜蘆風寒濕痹頭痛鼻塞下氣破痰頭面遊風百節拘攣齒痛目淚味辛性溫稟升陽之氣而為風劑辛香開竅故主療如上單服末至一錢令人悶絶辛藥不可多用也細辛發表散寒祛風止痛溫肺化痰飲用之得當收效甚捷然其性燥烈凡血虛內熱因而頭痛咳嗽者痛戒之二清散風熱薄荷味辛性溫無毒入肺經産蘇州者良散風熱清頭目利咽喉淨齦舌闢口臭暢鼻塞透痧疹通關節下滯氣除穢惡發汗解表故去風清熱利於頭面辛香開氣故脹滿食滯者並主之薄荷辛香伐氣多服損肺傷心豆豉味甘苦性寒無毒入肺脾二經解肌發汗頭疼與寒熱同除下氣清煩滿悶與溫㿀並妙疫氣瘴氣皆可用也痢疾瘧疾無不宜之外用治口舌生瘡煮汁救喉痹不語豆經蒸窨能升能散得蔥則發汗得鹽則止吐得酒則治風得薤則治痢炒熟又能止汗亦要藥也傷寒直中三陰與傳入陰經者勿用熱結胸煩悶宜下不宜汗亦忌之水萍味辛性寒無毒入肺經通毛竅達肌膚透癮疹癢能除發汗開鬼門下水潔淨腑水萍輕浮入肺經發汗氣化及州都因而利水水萍發汗力比麻黃下水功同通草苟非大實大熱者安敢輕試耶柳芽味微苦性寒入肺脾肝諸經散風去濕解熱止痛感冒鼻塞用之可通此即一般楊柳之芽須尚未飛花者為佳桑葉味苦甘性寒入肺肝二經散風解熱治感冒與乾咳清上平肝療眩暈與頭疼耳鳴重聽視弱目昏桑菊往往偕行表裡均治著稱風濕日久健筋骨配以烏麻疫喉初起清高熱伍以葛根癆熱可用其止汗膚癢能仗其安寧嫩葉煎酒醴關節通利蠶蝕之殘絡喉患堪珍沏茶止渴沐發生新作湯洗浴老年麻木遍於肢體研汁塗小兒吻瘡延及牙齦經霜為上氣質尤純石室祕録謂桑葉乃收汗之妙品與烏麻即黑芝麻共為蜜丸即桑麻丸尚可卻老駐顏蠶蝕之殘絡其上有蠶涎附著故因痰熱之咽喉疼痛音啞聲嘶者多效因藥肆不備須預蓄之菊花味甘性微寒無毒入肺腎二經枸杞桑白皮為使去蒂散風清熱明目平肝頭痛眩暈耳鳴心煩血脈缺利風陽上干令發不白耐老駐顏花能作枕葉可佐餐飲水益壽酈有菊潭野生苦薏解毒涼肝療瘡癰癤用之咸安破血通絡亦治麻頑獨稟金精善制風木高巔之上惟風可到故主用多在上部目者肝之竅也淚者肝之熱也宜其瘳矣三解暑利濕退熱香薷味辛性微溫無毒入脾胃二經忌見火發汗解表和中利濕暑期感冒無汗發熱腹痛吐利陽為陰遏治乘涼飲冷陽氣為陰邪所遏以致頭疼發熱煩躁口渴吐瀉者宜用之以發越陽氣散水和脾則愈若勞役受熱反用香薷是重虛其表而又濟之以溫則大誤矣香薷乃夏月解表之劑無表邪者戒之藿香味辛性微溫無毒入脾肺二經解暑闢濁化濕快膈溫中開胃行氣止嘔稟清和芳郁之氣為脾肺達氣要藥若陰虛火旺胃熱作嘔法當戒用豆卷味甘性平入脾胃二經利濕解熱襲受暑濕脘悶蒸熱得汗不解午後加熾肢體酸沉溲少便澀此物具通達宣利之能故可分利濕熱清達表邪纏綿之患用之有益四解肌葛根味甘性平無毒入肝經散鬱火解肌熱生津液止消渴頭痛乾嘔泄瀉下痢生用能墮胎蒸熟化酒毒跡其治驗皆在陽明一經止痢者升舉之功散郁者火鬱則發之義也東垣曰葛根鼓午胃氣上行治虛瀉之聖藥風藥多燥葛根獨止渴者以其升胃家下陷上輸肺金以生水耳聖惠方治小兒熱渴久不止用葛根煎服此法尤適用於夏季附葛蔓治喉痹消癰腫五和解柴胡味苦性微寒無毒入肝膽二經惡皂莢畏藜蘆忌見火少陽經藥性主升騰理肝膽善和解祛時疾內外熱不解治邪氣半表復半里寒熱往來傷寒瘧疾胸脅滿痛熱入血室柴胡少陽經半表半裡之藥病在太陽者服之太早則引賊入門病在陰經者復用柴胡則重傷其表世俗不知柴胡之用每遇傷寒傳經未明以柴胡為不汗不吐不下可以藏拙輒混用之致命不可勝數矣勞證唯在肝經者用之若氣虛者不過些小助參耆非用柴胡退熱也若遇勞證便用柴胡不死安待惟此一味貽禍極多故特詳言之幼科鐵鏡卷一首列九恨其第八恨云恨必用柴胡退燒脾虛腎虛氣血兩虛諸燒熱亦用柴胡對豫說出理來豫便不恨六治發作有時之寒熱草果味辛性溫入胃經破瘴癘之瘧消痰食之愆氣猛而濁故前人以仲由未見孔子時氣象比之瘧不由於嵐瘴氣不實邪不盛者並忌常山味辛苦性寒有毒入肝經酒炒透療痰飲有靈截瘧疾必效常山去老痰積飲為瘧家要藥必須好酒久炒令透不爾使人吐也常山猛烈施之強壯者多效若稍稍挾虛不可輕入清熱藥一清熱退溫症高燒金銀花味甘性平無毒入脾經清熱除瘟消癰解毒淨咽喉治齦舌風溫溫毒火丹瘡癤可寬膨脹能療痢血取用其藤通經入絡飲用其葉祛暑止渴稟春氣以生性極中和故無禁忌乃清解熱毒之良藥也藤名忍冬另有專條連翹味苦性寒無毒入心胃膽腎大腸五經清熱解毒消腫涼血除胸中火焰散諸經血結手少陰主藥也諸瘡痛癢皆屬心火故為瘡家要藥連翹苦寒多服即減食謹之黃芩味辛性寒無毒入肺大腸二經山茱萸龍骨為使畏丹砂牡丹藜蘆酒浸蒸熟曝之中枯而大者清肺部而止嗽化痰並理目赤疔癰堅實而細者瀉大腸而除濕治痢兼可安胎利水苦能燥濕苦能泄熱苦能下氣故治療如下經飄者上行堅重者下降不可不別也楊仁齊謂柴胡退熱不及黃芩不知柴胡苦以發之出火之標黃芩寒以勝熱折火之本又黃芩所清為腑熱柴胡所解為經熱苦寒傷胃證挾虛寒者均戒女人虛胎亦不宜與梔子味苦性寒無毒入肺三焦二經炒透治胸中懊憹而眠臥不寧疏臍下血滯而小便不利清太陰肺輕飄而上達瀉三焦火屈曲而下行梔子本非吐藥仲景謂邪氣在上得吐則邪出所謂高者因而越之也亦非利小便藥蓋肺清則化行而膀胱津液之腑奉氣化而出矣大苦大寒能損胃伐氣虛者忌之心腹痛不因火者尤為大戒世人每用治血不知血寒則凝反為敗證治實火之吐血順氣為先氣行則血自歸經治虛火之吐血養正為先氣壯則能攝血此治療之大法不可少違者也梔子花另有專條見咽喉用藥青蒿味苦性寒無毒入肝腎二經童便浸一宿曝清熱涼血解暑熱退潮熱清虛熱治癆熱溫瘧疸瘧早涼暮熱熱自陰來用之多捷苦寒之藥多與胃家不利惟青蒿芬芳襲脾宜於血虛有熱之人取其不犯沖和之氣耳寒而泄瀉者仍當避之知母味苦性寒無毒入肺腎二經忌鐵器肥白者佳去毛鹽酒炒透清肺熱而消痰捐咳瀉腎火而利水滑腸肢體腫浮為上劑傷寒煩熱號神良補寒水於不充益五臟之陰氣瀉腎家有餘之火是其本功至夫清金治腫諸效良由相火不炎自當馴致也知母陰寒不宜多服近世理癆尊為上品往往致泄瀉而斃故腎虛陽痿脾虛溏泄不思食不化食者皆不可用二清熱涼血退骨蒸地骨皮味甘性寒無毒入腎經治在表無定之風邪主傳尸有汗之骨蒸清血熱退低燒熱淫於內瀉以甘寒退熱除蒸目宜爾也又去風邪者肝腎同治也肝有熱則風自內生熱退則風息此與外感之風不同耳春日飲其湯可防皮膚病地骨皮乃除熱之劑中寒者勿服牡丹皮味辛性微寒無毒入心心胞肝腎四經畏貝母大黃菟絲子忌蒜胡荽與鐵器紅花單瓣者佳酒拌蒸曬用去血中之伏火退無汗之骨蒸消瘀通經排膿生血更散諸痛能療諸風潔古云牡丹為群花之首其色赤而其性寒故能去血中之伏火因入手厥陰與足少陰故能退無汗之骨蒸消瘀通經乃其辛散之用排膿生血皆其去熱之功且能入厥陰風木而善消瘀滯又何諸風諸痛之患哉李瀕湖云血中伏火即陰火也陰火即相火也古方以此治相火故仲景腎氣丸用之後人乃專尚黃柏不知牡丹皮之功更勝也此乃千載祕奧特為拈出牡丹皮性寒而辛散若久病血虛發熱及産婦虛熱而無瘀者宜斟酌用之紅牡丹花瓣另列專條見咽喉用藥白薇味苦咸性寒無毒入肝胃二經清熱涼血陰虛發熱血虛昏厥産後煩亂衝任須協低燒難退斷續不絶丹皮地骨青蒿竹葉分別配伍隨症而設用之得宜收效尚捷白薇涼降能清血熱既為女科藥又為溫熱證邪入血分之藥更為種種低燒如喉蛾久咳浮腫腰痠溲渾等之有效藥配伍得宜頗有良效因與白前易混淆故處方多書軟白薇以之與硬白前相對比也龜甲味鹹性寒有毒入心腎二經惡沙參蜚蠊去肋酥炙補腎退骨蒸養心增智慧固大腸而止瀉痢除崩漏而截痎瘧小兒囟門不合臁瘡腐臭難聞治軟弱之四肢愈赤白之帶下龜稟北方之氣故有補陰之功若入丸散須研極細恐著人腸胃變為瘕也煎成膠良龜鹿皆永年龜首藏向腹能通任脈取下甲以補腎補血皆陰也鹿鼻反向尾能通督脈取上角以補火補氣皆陽也腎虛而無熱者不用鱉甲味鹹性寒無毒入肝經惡礬酒浸一宿炙黃解骨間蒸熱消心腹癥瘕婦人漏下五色小兒脅下堅疼鱉色青主治皆肝證龜色黑主治皆腎證同歸補陰實有分別龜甲以自敗者為佳鱉甲以不經湯煮者為佳肝無熱者忌之鱉肉涼血補陰亦治瘧痢唯冷而難消脾虛者大忌三清熱瀉火生石膏味辛性寒無毒入肺胃二經惡莽草巴豆畏鐵營衛傷於風寒青龍收佐使之勳相付囚於火熱白虎定為君之劑頭疼齒痛肌膚熱入胃而搜逐消渴陽狂逆氣起入肺以驅除口乾舌焦可得效也中暑自汗又何患焉氣味俱薄體重而沉少壯火熱之人功如反掌老弱虛寒之人禍不旋踵極能寒胃使人腸滑不能食非有大熱者切勿輕投熟石膏煅熟研極細末外用可生皮治瘡口不斂與少量赤石脂為伍酌加冰片摻之有良效寒水石味辛咸性寒入胃腎二經降火清熱治天行火症止躁狂出血口乾齒衄丹投紫雪此藥與石膏相仿但能入腎故降火之力更著能直達下焦地龍味鹹性寒入脾胃二經清熱定驚平喘通絡火症高燒神昏抽搐半身不遂肢體麻木風陽上擾矇蔽頭目小便缺利時發喘促此物易黴易蛀若已黴蛀者萬不可再用四清熱燥濕黃連味苦性寒無毒入心經龍骨連翹為使惡菊花玄參芫花白蘚皮白殭蠶畏款冬牛膝解巴豆附子毒忌豬肉薑汁炒體陰質燥清熱除濕瀉心除痞滿明目理瘡瘍痢疾腹疼心痛驚煩殺蟲安蛔利水厚腸稟清寒之氣直瀉丙丁痞滿目疾瘡瘍驚痛南方亢上之象泄痢蛔蟲濕熱之愆苦以燥之寒以清之固宜痊也韓豫心曰黃連與官桂同行能使心腎交於頃刻時珍曰香連丸用黃連木香木火散用黃連乾薑左金丸用黃連吳茱萸薑黃散用黃連生薑口瘡方用黃連細辛皆一冷一熱寒因熱用熱因寒用陰陽相濟最得制方之妙黃柏味苦性寒無毒入腎經惡乾漆鹽酒炒肥厚鮮黃者佳瀉龍火而救水利膀胱以燥濕佐以蒼朮理足膝之痹痛漬以蜜水漱口舌之生瘡黃柏瀉陰火除濕熱故治療如上昔人謂其補陰者非其性補益熱去則陰不受傷雖謂之補亦宜按苦寒之性利於實熱不利於虛熱凡脾虛食少或瀉或嘔或好熱或惡冷或腎虛五更泄瀉小便不禁少腹冷痛陽虛發熱瘀血停止産後血虛發熱金瘡發熱癰疽潰後發熱傷寒發熱陰虛小水不利痘後脾虛小水不利血虛煩躁不眠等症法咸忌之苦參味苦性寒無毒入腎經玄參為使惡貝母菟絲漏蘆反藜蘆泔浸一宿蒸過曝乾除熱祛濕利水固齒癰腫瘡瘍腸澼下血風癘疥癬在所亟需味苦性寒純陰之品故理濕熱有功瘡毒腸澼皆濕蒸熱閼之愆宜其咸主齒乃骨之餘清腎骨自固耳苦參大苦大寒不惟損胃兼且寒精向非大熱惡敢輕投五清熱解毒犀角味苦酸咸性寒無毒入心胃肝三經升麻為使惡烏頭烏喙忌鹽解煩熱而心寧驚悸狂邪都掃散風毒而肝清目昏痰壅偕消吐衄崩淋投之輒止癰疽發背用以消除解毒高於甘草祛邪過於牛黃犀角雖有徹上徹下之功不過涼血解毒驅邪清熱而已大寒之性非大熱者不敢輕服妊婦多服能消胎氣牛黃味苦甘性平無毒入心肝二經人參為使惡龍骨龍膽地黃常山蜚蠊畏牛膝乾漆清心主之煩熱狂邪祟俱消攝肝臟之魂驚癇健忘同療利痰氣而無滯入筋骨以搜風東垣曰牛黃入肝治筋中風入臟者用以入骨追風若中腑中經者誤用之反引風入骨如油入面莫之能出玳瑁味甘性寒無毒入心肝二經解毒清熱鎮心平肝熱病傳裡五內灼燔神昏譫語煩躁不安能救客忤可止驚癇局方至寶丹中用之乃救急之良劑也貫衆味苦性寒有毒入肝經去皮毛銼焙殺蟲解毒化哽破症産後崩淋金瘡鼻血有毒而能解毒去瘀而能生新然古方中不恆用之別名管仲豈音相類耶抑為其有雜霸之氣耶馬齒莧味酸性寒無毒入心大腸二經清利濕熱解毒散血內服治痢又療瘡癤禳解疫癘通利關節外敷消腫疔癰流火蜂螫劇疼塗之緩和唐寶經驗方云六月六日採馬齒莧曬乾元旦煮熟同鹽醋食之可解疫癘氣迄今長江下游春節尚食用馬齒點心名之曰安樂菜蓋此菜可以清腸可防節日傷食所致諸疾也一切紅腫熱痛之症以之擠汁外塗均有良效補益藥一補氣人參味甘性微溫無毒入肺脾二經茯苓為使惡藜蘆畏五靈脂去蘆用補氣安神除邪益智療心腹寒痛除胸脅逆滿止消渴破堅積氣壯而胃自開氣和而食自化人參得陽和之氣能回元氣於垂亡氣足則神安正旺則邪去益智者心氣強則善思而多智也真氣虛者中寒而痛胸滿而逆陽春一至寒轉為溫否轉為泰矣破積消食者脾得干健之運耳人參亦有不宜用者世之録其長者遂忘其短摘其瑕者並棄其瑜或當用而後時或非宜而妄設不蒙其利只見其害遂使良藥見疑於世粗工互騰其口良可憾也參鬚性專下行宜於胃虛嘔逆咳血等不宜於久痢滑精崩中下血等參葉能生津可代茶飲黨參味甘性平無毒入脾肺二經補中益氣脾肺均宜健脾運而中宮不燥滋胃陰而胸膈不泥潤肺而不犯寒涼養血而不偏滋膩中氣微弱氣短心悸食少便溏體倦易疲鼓午清陽常服有濟黨參功同人參而力量較薄但能久服可無大弊黃耆味甘性微溫無毒入肺脾二經茯苓為使惡龜甲白蘚皮嫩緑色者佳蜜炙透補肺氣而實皮毛斂汗托瘡解渴定喘益胃氣而去膚熱止瀉生肌補虛治癆風癩急需痘瘍莫缺種種功勳皆是補脾實肺之力能理風癩者經謂邪之所湊其氣必虛氣充於外邪無所容耳黃耆實表有表邪者勿用助氣氣實者勿用多怒則肝氣不和亦禁用也白朮味苦甘性溫無毒入脾胃二經防風為使忌桃李青魚産於潛者佳米泔水浸半日土蒸切片蜜水拌勻炒令褐色健脾進食消穀補中化胃經痰水理心下急滿利腰臍血結祛周身濕痹君枳實以消痞佐黃芩以安胎白朮甘溫得土之沖氣補脾胃之良藥也脾胃健於轉輸新谷善進宿谷善消土旺自能勝濕痰水易化急滿易解腰臍間血周身之痹皆濕停為害濕去則安矣消痞者強脾胃之力安胎者化濕熱之功陰虛燥渴便閉滯下肝腎有築築動氣者勿服又百草鏡謂冬採者為冬朮汁歸本根滋潤而不枯燥卻易油不能止瀉故處方稱為冬朮甘草味甘性平無毒入脾肺二經白朮為使反大戟芫花甘遂海藻惡遠志忌豬肉令人陽痿補脾以和中潤肺而療痿退熱止瀉堅筋長肌調和群品普治百邪解一切毒和一切藥稍止莖中作痛節醫腫毒諸瘡外赤內黃備坤離之色味甘氣平資戊己之功益陰除熱有裨金宮故咳嗽咽痛肺痿均治也安中扶正補益土臟故瀉痢虛熱肌肉均賴也諸毒遇土則化甘草為九土之精故百毒化熱藥用之緩其熱寒藥用之緩其寒理中湯用之恐其僭上承氣湯用之恐其速下黃宮繡謂傷寒論金匱要略兩書中凡為方二百五十用甘草者至一百二十方非甘草之主病多乃諸方必合甘草始能曲當病情也甘能作脹故中滿者忌之嘔家忌甘酒家亦忌甘二補陽鹿茸味甘咸性溫無毒入腎經形如茄子色如瑪瑙紅玉者良烙去毛酥炙益氣而強志健骨而生齒去肢體痠疼除腰脊軟痛虛癆聖劑崩漏神丹角茸生兩月即成角矣補腎生精髓強骨壯腰膝止崩中與吐血除腹痛而安胎肉甘溫補中強五臟通脈益氣力鹿稟純陽之質含生髮之氣其性極淫一牡常御百牝腎氣有餘足於精者也故主用最多專以壯陽道補精髓為功茸較佳於角肉有益於脾上焦有痰熱胃家有火吐血屬陰衰火盛者俱忌生角消腫毒逐惡血不及膠之用宏也鹿山獸屬陽夏至解角陰生陽退之象也麋澤獸屬陰冬至解角陽生陰退之象也主用相懸不可不辨鐘乳石味甘性熱有毒蛇床為使惡牡丹牡蒙畏紫石英忌羊血反人參白朮入銀器煮水減即添煮三日夜色變黃白換水再煮色清不變毒去盡矣水飛過再研半日益精壯陽下焦之虛弱堪珍止嗽解渴上部之虛寒宜寶其氣剽悍令陽氣暴充飲食倍進昧者得此肆淫則精竭火炎發為癰疽淋濁豈鍾乳之罪邪大抵命門火衰者相宜不爾便有害矣三補陰沙參味苦性微寒無毒入肺經惡防己反藜蘆補中益肺養胃生津肅清上熱疏痰利咳定心內驚煩退皮間邪熱氣輕力薄非肩弘任大之品也人參甘溫體重專益肺氣補陽而生陰沙參甘寒體輕專清肺熱補陰而制陽沙參性寒臟腑無實熱及寒留肺經而嗽者勿服太子參又名孩兒參味甘微苦性平無毒入脾肺二經益氣健脾生津養肺氣血不足病後虛羸倦怠乏力自汗萎靡食少心悸口乾液虧用以調補能使春回此藥力薄須持續服用其效始著西洋參味苦甘性涼無毒入肺胃二經滋補肺金稱善療治虛火尤宜能養胃以生津除煩倦而不疲傷寒論之竹葉石膏湯白虎加人參湯均可改用西洋參生地黃味甘性寒無毒入心肝脾腎四經惡貝母忌銅鐵蔥蒜蘿蔔諸血産懷慶黑而實肥者佳涼血補陰去瘀生新養筋骨益氣力理胎産主勞傷通二便消宿食心病而掌中熱痛脾病而痿躄貪眠熟地黃性味畏忌俱同生地黃用砂鍋柳甑襯以荷葉將生地黃酒潤用縮砂仁粗末拌蒸蓋復極密文武火蒸半日取起貯極干如前又蒸九次為度令中心透熟純黑乃佳滋腎水封填骨髓利血脈補益真陰久病餘脛股痠痛新産後臍腹急疼地黃合地之堅凝得土之正色為補腎要藥益陰上品稟仲冬之氣故涼血有功陰血賴養新者生則瘀者去血受補則筋受榮腎得之而骨強力壯矣胎産勞傷皆血之愆血得其養證因以痊腎開竅於二陰況血主濡之二便所以利也濕熱盛則食不消地黃去濕熱以安脾胃宿滯乃化掌中應心主痿蹶乃脾熱奉君主而清其倉廩兩證可瘳矣熟者稍溫補陰補血滋腎養肝其功更溥六味丸以之為首天一所生之本也四物湯以之為主乙癸同源之義也久病陰傷新産血敗在所極需生地黃性寒而潤胃虛食少脾虛瀉多均在禁例熟者性滯若痰多氣鬱之人能窒礙胸膈當斟酌用之姜酒拌炒生者不妨胃熟者不泥膈黃精味甘性平無毒入脾經益氣養陰補脾潤肺肺燥乾咳氣餒消渴體虛乏力用以服食味甘氣和為益脾陰之劑土旺則濕除故又能祛濕石斛味甘性平無毒入胃腎二經惡巴豆畏殭蠶酒浸酥拌蒸清胃生肌逐皮膚虛熱強腎益精療腳膝痹弱厚腸止瀉安神定驚益陰也而愈傷中清肺也則能下氣入胃清濕熱故理痹證泄瀉入腎強陰故理精衰骨痛其安神定驚兼入心也石斛宜於湯液不宜入丸形長而細且堅味甘不苦為真誤用木斛味大苦餌之損人旱蓮草一名鱧腸味甘咸無毒入腎經補腎止血黑髮烏須其效甚宏當及時多收之苗如旋覆實如蓮房斷之有汁須臾而黑故名墨旱蓮或酒煎或熬膏四陰陽雙補葳蕤味甘性平無毒入肺脾肝腎四經蜜水拌蒸潤肺而止嗽痰補脾而去濕熱養肝而理眥傷淚出益腎而除腰痛莖寒葳蕤滋益陰精與地黃同功增長陽氣與人參同力潤而不滑和而不偏譬諸盛德之人無往不利本經謂其主諸不足確是如此何首烏味苦澀性微溫無毒入肝腎二經茯苓為使忌豬血無鱗魚蘿蔔蔥蒜鐵器選大者赤白合用泔浸黑豆拌九蒸九曬補真陰而理虛癆益精髓而能續嗣強筋壯骨黑髮悅顏消諸種癰瘡療陰傷久瘧治崩中帶下調産後胎前昔有老叟何姓者見有藤夜交掘而服之鬚髮盡黑故名何首烏補陰而不滯不寒強陽而不燥不熱稟中和之性而得天地之純氣者歟何首烏與白蘿蔔同食能令鬚髮早白犯鐵器損人謹之山茱萸肉味酸性微溫無毒入肝腎二經蓼實為使忌桔梗防風防己酒潤去核微火烘乾補腎助陽事腰膝之疴不必慮也固精縮小便遺泄之證寧足患乎月事多而可以止耳鳴響而還其聰益腎養肝陰陽雙補四時之令春氣暖而生秋氣涼而殺萬物之性喜溫而惡寒人身精氣亦賴溫暖而後充足況腎肝居至陰之位非得溫暖之氣則孤陰無以生山茱萸正入二經性溫而主補味酸而主斂故精氣益而腰膝強也強陽不痿小便不利者不宜用五味子味甘酸核中苦辛咸性溫無毒入肺腎二經蓯蓉為使惡葳蕤嗽藥生用補藥微焙遼東肥潤者佳滋腎經不足之水強陰澀精除熱解渴收肺氣耗散之金療咳定喘斂汗固腸潔古云夏服五味使人精神頓加兩足筋力湧出東垣云收瞳神散大火熱必用之藥丹溪云收肺保腎乃火嗽必用之藥五味功用雖多收肺保腎四字足以盡之五味乃要藥人多不敢用者寇氏虛熱之說誤之耳惟風邪在表痧疹初發一切停飲肺家有實熱者皆當禁之南天燭子味酸甘性平入肺脾腎三經益氣力強筋骨固精氣駐顏色斂肺金治久咳此藥得效即止不宜常用亦陰陽雙補之品也人胞味甘咸性溫無毒入心腎二經米泔洗淨童便浸揉色白為度入鉛瓶中封固重湯煮三時待冷方開補心除驚悸滋腎理虛癆養血益氣寧志返老陰陽雙補坎氣名高此物陳藏器吳球二氏均富使用之經驗吳氏所訂之大造丸乃傳世之名方也血餘味苦性溫無毒入心肝腎三經去瘀血補真陰父發與雞子同煎免嬰兒驚悸己發與川椒共煅令本體烏頭吐血衄紅取效腸風崩帶宜求發者血之餘也故於血證多功入罐中鹽泥固濟煅存性肺腎陰虛之失音以血餘炭加入適當方中活血補陰頗有裨益五補血藥當歸見女科熟地見補陰三七味甘苦性溫無毒生者散瘀止血消腫定痛跌僕外傷諸種失紅熟品補血和血虛症堪用此藥既能內服亦可外治活血化瘀旅行及居家備之可以救急仙鶴草味辛澀性偏溫無毒入肺肝脾三經能強身止血治過力勞傷熱病腸紅拯救虛人吐衄頻嘗此草止血和血又能補益為虛人血症不可或缺之藥龍眼肉見食療阿膠見女科理血藥一涼血紫草味苦性寒無毒入心胞絡肝三經涼血和血清解瘡瘍宣發痘疹通大小腸治五疳以稱善利九竅而允藏紫草涼而不凝為痘家血熱之要藥但痘證極重脾胃過用則有腸滑之虞丹皮見退骨蒸藥白薇見退骨蒸藥赤芍味苦性寒入肝經涼血清營散瘀通結止痛消腫用於癰癤本草求真曰赤芍與白芍主治略同但白則有斂陰益營之力赤則只有散邪行血之意白則能於土中瀉木赤則能於血中活滯二止血兼化瘀茅根味甘性寒無毒入肺經涼金定喘治吐衄並血瘀利水通淋祛黃疸及癰腫茅針潰癰茅花止血甘寒可除內熱性又入血消瘀且下達州都引熱下降故吐血衄血者急需之吐血有因於寒有因於虛者非所宜也蒲黃味甘性平無毒入肝經熟用止血生用行血伍五靈脂治心腹痛入東方血海是其本職利小便者兼入州都耳蒲黃乃手足厥陰血分藥能涼血散血故血分瘀滯之痛皆可用之又舌脹滿口及舌上生瘡均可外用無瘀血者勿用白芨味苦性微寒無毒入肺經反烏頭肺傷吐血建奇功癰腫排膿稱要劑性收色白合乎秋金入肺經以療諸熱之證收中有散又能排膿癰疽潰後不宜與苦寒藥同服茜草味苦性寒無毒入心胞腎二經行血止血消瘀通經風痹咸宜撲損可治茜草忌鐵根可染絳但無瘀者勿用大薊小薊味甘性溫無毒入心肝二經崩中吐衄瘀血停留二薊性味主療皆同但大薊兼主癰疽也二薊破血之外無他長不能益人翻白草味甘微苦性平無毒止血解毒吐血下血崩中齒衄口瘡常發頻餐可復渾身疥賴臁瘡濕毒潰瘍不愈用之洗浴速效難期貴在持續此草有撥亂反正之功頑固難愈之出血與潰瘍常用於適當方中頗有靈驗側柏葉味苦性微寒無毒入肝經牡蠣為使忌同柏子仁止吐衄來紅定崩淋下血歷節風疼可愈周身濕痹能安微寒補陰故應止血其治風濕者益脾之力也柏有數種惟根上發枝數莖蒙葺茂密名千頭柏又名佛手柏是真側柏也柏性挾燥血家不宜多服墨味辛性溫無毒燒紅研細止血以苦酒送下消癰用豬膽調塗磨濃點入目之飛絲和酒治胞胎之不下墨者北方之色血者南方之色止血者火見水而伏也內有鹿角膠非煅紅不可用海鰾鮹即烏賊骨味鹹性溫無毒入肝經惡白芨白蘞附子炙黃止吐衄腸風澀久虛瀉痢外科燥膿收水眼科去翳清煩吐血下血腹痛環臍女子血枯漏下赤白味鹹入血性澀能收故有軟堅止滑之功花蕊石味酸性平無毒火煅水飛止吐衄如神消瘀血為水血見花蕊石即化為水過用損血不可不謹三破血逐瘀桃仁味苦甘性平無毒入肝大腸二經香附為使泡去皮尖炒勿用雙仁者破諸經之血瘀潤大腸之血燥肌有血凝而燥癢堪除熱入血室而譫言可止苦重於甘氣薄味厚沉而下降為陰中之陽苦以推陳甘以生新故血疾恆需之桃仁破血血瘀者當用若用之不當大傷陰氣荊三稜味苦性平無毒入肝經醋炒下血積有神化堅癖為水昔有患癖死者遺言開腹取視得病塊堅如石紋理五色人謂異物竊作刀柄後以刀刈三稜柄消成水故治癖多用焉潔古謂三稜瀉真氣虛者勿用東垣五積諸方皆有人參贊助如專用克削脾胃愈虛不能運行積安得去乎蘇木味甘鹹性平無毒入心肝脾三經能除新舊之瘀血兼宣表裡之風邪蘇木理血與紅花同功少用和血多用即破血也故能治跌撲損傷壅塞作痛其治風者所謂治風先治血血行風自滅也麒麟竭一名血竭味甘鹹性平有小毒入心肝二經凡用另研若同他藥搗則化為飛塵産於外國難得真者磨之透甲燒灰不變色者佳走南方兼達東方遂作陰經之主和新血且推陳血真為止痛之君乳香沒藥兼主氣血此則專於血分者也善收瘡口然性急不可多使卻能引膿水蛭味鹹苦性平入肝經畏石灰鹽炒枯黃惡血積聚閉結堅牢炒末調吞多效赤白丹腫癰毒初生竹筒含咂有功咸走血苦勝血故為攻血要藥䗪蟲味鹹性寒有毒畏皂莢菖蒲屋遊即地鱉蟲去血積搜剔極周主折傷補接至妙煎含而木舌旋消水服而乳漿立至仲景有大黃䗪蟲丸以有攻堅下血之功也虛人斟酌用之歸尾見女科紅花見女科氣血兼理藥與理氣藥一氣血兼理鬱金味辛苦性寒無毒入肺心心胞肝胃五經解鬱行氣止痛活血涼心通肺寬胸舒脅配明礬豁痰涎開神明之蒙伍射干治喉痹散陰陽之結能開肺金之郁故名鬱金丹溪又謂古人用治郁遏不能升者恐命名因此鬱金本入血分之氣藥由産地不同尚可區分其功效廣産者色黃善行氣而有功肺部川産者色紫能入營而長於活血薑黃味苦辛性溫無毒入脾肝二經破血下氣散腫消癰辛散苦泄故專功於破血下氣其旁及者耳此藥能宣通血中之氣使氣行而血無壅滯別有一種片子薑黃止臂痛有效血虛者不宜服之玄胡索味辛性溫無毒入肺肝二經酒炒活血利氣止腹痛心疼調經利産主血暈崩淋行血中氣滯氣中血滯理通身諸痛療疝舒筋乃破血利氣之良藥也玄胡索走而不守惟有瘀滯者宜之若經事先期虛而崩漏産後血虛而暈則不可服蓬莪朮味甘辛性溫無毒入脾肝二經酒炒破氣行血消積止痛婦人結聚丈夫奔豚氣不調和臟腑壅滯陰陽乖隔病邪憑之此能利氣達竅則邪無所容矣蓬莪朮誠為磨積之藥但虛人得之積不去而真已竭重可虞也或與健脾補元之藥同用乃無損耳降真香味辛性溫無毒色紅者良行瘀滯之血如神止金瘡之血至驗理肝傷吐血勝似鬱金理刀傷出血過於花蕊降香色鮮紅者行血下氣有功若紫黑色者不堪用也兼可辟邪逐穢燒之闢天行時氣宅舍怪異五靈脂味甘性溫無毒入肝經惡人參酒飛去沙曬止血氣之痛無異手拈行冷滯之瘀真同仙授五靈脂乃寒號禽之糞也氣味俱厚獨入厥陰主血生用行血炒熟止血痛證若因血滯者下咽如神性極膻惡脾胃虛薄者不能勝也二理氣香附味苦性微溫無毒入肺肝二經童便浸曬焙生用發表制用化氣消痰開鬱解憂釋疑止脅下痛與腹內脹疼治胸中熱與脘際悶痞胎産常用女科偏宜十二經通三焦暢利稟天地溫燥之氣入人身金木之宮血中之氣藥也韓飛霞稱香附於氣分為君藥統領諸藥隨用得宜乃氣病之總司女科之主帥也性燥而苦獨用久用反能耗血如上所述之功皆取其治標非治本也懼燥蜜水炒懼散醋炒之木香味辛性溫無毒入肺脾肝三經生用理氣煨熟止瀉平肝降氣郁可開而胎可安健胃寬中食可消而痢可止何患乎鬼邪蠱毒無憂於冷氣心疼氣味純陽故辟邪止痛吐瀉停食脾疾也土喜溫燥得之即效氣鬱氣逆肝疾也木喜疏通得之即平胎前須順氣故能安胎木香香燥而偏於陽肺虛有熱血枯而燥者慎用橘絡味甘微苦性平入肝胃二經舒氣化痰通絡散結可消阻滯又能活血金御乘稱之為橘絲謂其專能宣通經絡滯氣趙學敏謂其驅皮裡膜外積痰活血枳殼味苦微寒無毒入肺脾胃大腸四經麵炒破至高之氣除咳逆停痰助傳導之官消水留脹滿枳實即枳殼之小者破積有雷厲風行之勢瀉痰有沖牆倒壁之威解傷寒結胸除心下急痞枳殼枳實上世未嘗分別自東垣分枳殼治高枳實治下海藏分枳殼主氣枳實主血然究其功用皆利氣也又何必分上與下氣與血乎但枳實則性急枳殼則性緩為確當耳枳殼花致富全書云花細而香聞之破鬱結急症關下喉痹嗅其芳香之氣有益大腹皮味苦性微溫無毒入脾胃二經開心腹之氣逐皮膚之水主用與檳榔相仿但力少緩耳鴆鳥多集大腹樹上宜以大豆汁多洗令黑汁去盡火焙用病涉虛者勿用楝實一名金鈴子味苦性寒有毒入脾肺二經熱厥心痛腹疼疝氣可殺三蟲能利小便根微寒殺諸蟲通大腸與延胡索相伍治心腹痛頗靈性寒極苦若脾胃虛寒者忌之烏藥味辛性溫無毒入胃膀胱二經主膀胱冷氣攻衝療胸腹積停為痛天行疫瘴宜投祟犯蠱傷莫廢辛溫芳馥為下氣溫中要藥氣虛及血虛者勿用沉香味辛性溫無毒入脾胃肝腎四經調和中氣破結滯而胃開溫補下焦壯元陽而腎暖療脾家痰涎之血去肌膚水腫之邪大腸虛閉宜投小便氣淋須用芬芳之氣與脾胃相投溫而下沉與命門相契怒則氣上肝之過也辛溫下降故平肝有功沉香降氣之要藥然命門火衰不宜多用氣虛下陷者切勿沾唇檀香味辛性溫無毒入肺心胃三經芳香闢穢降逆理氣運中宮能於開胃進食療噎調上焦氣在胸膈咽嗌之間通鼻竅塞止心腹疼東垣云白檀調氣引芳香之物上至極高之分最宜橙橘之屬輔以砂蔻益智通行陽明之經為理氣要藥薤白見食療香櫞味苦性溫無毒入肺脾二經年久者良去白炒理上焦之氣止嘔宜求進中州之食健脾宜簡性雖中和單用多用亦損正氣脾虛者須與參朮並行乃有相成之益耳花作茶飲可舒氣寬胸佛手味辛苦酸性溫無毒入肝胃二經行氣開鬱豁痰辟惡舒肝悅脾和胃止惡胸悶脅脹咳喘頻作梅核氣阻時時感覺花芳香止痛和暢肺肝陰血不足者不宜常用多用建蘭葉味辛性平無毒入肺脾胃肝四經生津止渴開胃消痰通舒經絡流暢肺肝陳郁之氣久積能散辛平能散結滯芳香能除穢惡又能潤肌膚悅顏色産閩中者力勝江浙諸種治痰藥一溫化寒痰橘皮附橘紅味辛性溫無毒入肺脾二經廣中者最佳福建者力薄浙産便又遜矣陳久愈佳去蒂及浮膜曬乾止嗽定嘔頗有中和之妙清痰理氣卻無峻烈之嫌留白者補胃偏宜去白者疏通端掌苦能泄氣又能燥濕辛能散氣溫能和氣同補藥則補同瀉藥則瀉同升藥則升同降藥則降夫脾乃元氣之母肺乃攝氣之籥故獨入二經氣雖中和然單服久服亦損真元橘皮下氣消痰橘肉生痰聚氣一物也而相反如此橘紅性熱除寒下氣消痰散結半夏味辛性溫有毒入心脾胃三經柴胡為使惡皂莢畏雄黃薑鱉甲及烏頭忌羊血海藻飴糖水浸五日每日換水去涎姜礬同煮汁干為度消痰燥濕開胃健脾咳逆嘔吐頭眩昏迷痰厥頭痛心下滿堅消癰可也墮胎有焉汪機曰脾胃濕熱涎化為痰此非半夏曷可治乎時珍曰脾無濕不生痰故脾為生痰之源肺為貯痰之器半夏治痰為其體滑辛溫也俗以半夏為燥不知濕去則土燥痰涎不生非其性燥也但恐非濕熱之邪而用之是重竭其津液誠非所宜按半夏主治最多莫非脾濕之證苟無濕者均在禁例古人謂半夏有三禁謂血家渴家汗家也若無脾濕且有肺燥誤服半夏悔不可追責在司命謹諸戒諸南星味苦辛性溫有毒入肝脾二經畏附子乾薑生薑冬月研末入牛膽中懸風處風痰阻絡之麻痹以及上擾之眩暈均堪醫治痰濁凝聚之堅積破傷風濕之噤強亦可酌施伍木香利痰行氣和龍腦急救揩齒配荊芥治風痰頭痛調薑汁治風痛痰迷南星入肝去風痰性烈而燥得牛膽則燥氣減得火炮則烈性緩得防風則不麻和豬膽能治小兒癇後之喑南星治風痰半夏治濕痰功用雖類而實殊也非西北人真中風及懷孕之人勿服白附子味辛性溫有毒入胃經炮去皮臍消痰去濕止痙除麻中風失音口眼喎斜白附子引藥上行與黑附子非一類也白附子燥藥也似中風證雖有痰亦禁用小兒慢驚勿用白芥子味辛性熱無毒入肺經解肌發汗利氣疏痰溫中而冷滯冰消辟邪而祟魔遠遁酒服而反胃宜痊醋塗而癰毒可散伍蘇萊為三子養親同術棗治胸脅痰飲痰在脅下及皮裡膜外者非白芥子不能達煎湯不可太過便減力量肺經有熱陰虛火亢者勿服莖葉動風動氣有瘡瘍痔疾者俱忌二清化熱痰天花粉味甘微苦酸性寒無毒入心脾二經枸杞為使惡乾薑畏牛膝乾漆反烏頭燥得以潤痰可以清排膿散腫利膈清心止渴退煩熱通乳生唾津消瘀血催月經消痰解熱是其職專通經者非若桃仁薑黃之直行血分熱清則血不瘀耳舊稱補虛亦以熱退為補不可不察耳聾未久者可用釀酒飲之有益天花粉稟清寒之氣脾胃虛寒及泄瀉者忌用竹瀝味甘性寒無毒入心胃二經薑汁為使痰在皮裡膜外者直達以宣通痰在經絡四肢者屈曲而搜剔失音不語偏宜肢體攣蜷決用竹瀝滑腸脾虛泄瀉者勿用惟痰在皮裡膜外經絡肢節者相宜若寒痰濕痰與食積痰勿用荊瀝味甘性平入心肺肝諸經除風熱開經絡行血氣導痰涎去胸中煩悶治頭風眩暈大人中風失音小兒心熱驚癇牡荊俗名黃荊截取尺余架磚上中間火炙兩頭以器承取即得李時珍云荊瀝化痰去風為妙藥千金翼方云凡患風人多熱常宜以竹瀝荊瀝薑汁合計五合和勻熱服以瘥為度延年祕録云熱多用竹瀝寒多用荊瀝朱震亨云二汁同功並以薑汁助送則不凝滯但氣虛不能食者用竹瀝氣實能食者用荊瀝海石味鹹性平無毒入肺經清金降火止濁治淋積塊老痰逢便化癭瘤結核遇旋消海石乃水沫結成體質輕飄肺家之象也氣味鹹寒潤下之用也故治證如上多服損人氣血青礞石味鹹性平入肝經火煅水飛化頑痰癖結行食積停留痰見青礞即化為水脾虛者大忌瓦楞子即蚶殼也味鹹性平無毒火煅醋淬研消老痰至效破血癖殊靈咸走血而軟堅故主治如上三逐痰皂莢味辛咸性溫有小毒入肺肝胃三經柏子為使惡麥門冬畏人參苦參刮去粗皮及弦與子酥炙用宣壅導滯開竅通關驅邪辟疫搜風逐疫㗜之治噤口中風濯之則除濕去垢塗之而散腫消毒焚之可闢疫除瘟性極尖利無閉不開無堅不破中風傷寒門賴為濟急之神丹若類中風由於陰虛者禁之孕婦亦禁子去皮水浸軟煮糖漬食之治大腸虛祕瘰癧惡瘡刺另見外科類溫里藥附子味辛甘性熱有毒入脾腎二經畏防風黑豆甘草黃耆人參童便犀角重一兩以上矮而孔節稀者佳童便浸一日去皮切作四片童便及濃甘草湯同煮汁盡為度烘乾冬採為附子主寒疾春採為烏頭主風疾補元陽益氣力墮胎孕堅筋骨心腹冷疼寒濕踒躄足膝癱軟堅瘕症癖主治繁衆皆由風寒濕三氣所致邪客上焦咳逆心痛邪客中焦腹痛積聚邪客下焦腰膝腳痛附子熱而善走諸證自瘥也虞摶曰稟雄壯之質有斬關之能引補氣藥以追散失之元陽引補血藥以養不足之真陰引發散藥以驅在表之風邪引溫暖藥以除在裡之寒濕吳綬曰傷寒傳變三陰及中寒夾陰身雖大熱而脈沉者必用之厥冷腹痛脈沉而細唇青囊縮者急用之近世往往不敢用直至陰極陽竭而後議用晚矣附子退陰益陽祛寒濕之要藥也若非陰寒寒濕陽虛氣弱之病而誤用於陰虛內熱禍不旋踵肉桂味辛甘性大熱有小毒入肝腎二經畏石脂忌生蔥去皮用見火無功益火消陰救元陽之痼冷溫中降氣扶脾胃之虛寒堅筋骨強陽道乃助火之勳定驚癇通血脈屬平肝之績下焦腹痛非此不除奔豚疝瘕用之即效宣通百藥善墮胞胎桂心入心腎二經理心腹之恙三蟲九痛皆瘥補氣脈之虛五癆七傷多驗宣氣血而無壅利關節而有靈托癰疽痘毒能引血成膿肉桂乃近根之最厚者桂心即在中之次厚者桂枝即頂上細枝另列專條以其皮薄又名薄桂肉桂在下主治下焦桂心在中主治中焦桂枝在上主治上焦此本乎天者親上本乎地者親下之道也桂性偏陽不可誤投如陰虛之人一切血證及無虛寒者均當忌之乾薑味辛性熱無毒入肺脾二經破血消痰腹痛胃翻均可服溫中下氣癥瘕積脹悉皆除開胃扶脾消食去滯生行則發汗有靈炮黑則止血頗驗乾薑本辛炮之則苦守而不移非若附子行而不止也其止血者蓋血虛則熱熱則妄行炒黑則能引補血藥入陰分血得補則陰生熱退且黑為水色故血不妄行也然血寒者可多用血熱者不過用三四分為嚮導而已姜味大辛辛能僭上亦能散氣走血久服損陰傷目凡陰虛有熱者勿服蜀椒味辛性熱有毒入肺脾胃三經杏仁為使畏款冬花防風附子雄黃閉口者害人溫脾土而擊三焦之冷滯補元陽而蕩六腑之沉寒飲癖氣症和水腫纍建奇功殺蟲止嘔及腸虛恆收速效通血脈則痿痹消除行肢節則機關健運椒目善消水腫可塞耳聾椒稟純陽之氣乃祛寒濕散風邪溫脾胃暖命門之良藥命門火衰中氣寒冷者宜之若陰虛火旺之人在所大忌
