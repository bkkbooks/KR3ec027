front:
  text: 序言李中梓字仕材先生系明末江南醫學教育家籍貫松江府南匯縣生於萬曆十五年丁亥卒於順治十二年乙未終年六十八歲先生精於醫復精於文臨症經驗甚豐授徒眾多其中頗有傑出者如馬元儀尤生州等皆是傳其法乳者李氏生平著作甚豐均著眼於培養後進與臨症切用且文辭綺麗使深於醫者與初學之士兩皆適用當其中年曾草頤生微論自視猶覺不足乃改寫為刪補頤生微論其中談藥之作多編為韻語崇禎十年又重著醫宗必讀十卷鑑於學醫者必先有文學水平故卷一為醫論圖說首列論文十三篇以骨度藏象等圖附於後卷二為四言脈訣補原著之缺略正傳本之差訛仍舊者十之二三新改者十之七八並以脈法心參附於後記臨症之得乎心而應乎手者與得乎心而不能喻諸口者一一詳加記載而以色診附焉卷三卷四為本草徵要詳見後述卷五為傷寒卷六至卷十為雜病於論述一病之後多附有自己之醫案內容均切實用便於學習嘉惠後學匪淺乃傳世之傑作故在清代大江南北之習醫者每以之作為範本此冊乃徵要之刪補單行本姑就發展源流及變化情況詳加敘述以弁其端藥學書之用韻語或賦體蓋冀後學者之便於誦習也自金元以來傳本甚多如藥性賦為四言四句等然作賦須對比每拈兩藥湊為一聯常有言而未透之感四言者限於十六字有因內容較多不盡其意者有因主治單純尚覺字多者後者雖關係不大然從整體觀之則藥之突出主次與使用面之寬窄又難一目瞭然李氏有鑑於此故略仿賦體而採用長短偶句使其繁簡適宜修短合度初學之士受惠實多著者於卷端題云本草太多令人有望洋之苦藥性太少令人有遺珠之憂茲以綱目為主刪繁去復獨存精要採集名論竊附管窺詳加註釋比之珍珠囊極其詳備且字句整嚴便於誦讀徵要內容首列藥名藥名之下以小字標出味性歸經及為使之藥並記畏忌惡反與炮製之要求間加必要之別名次入正文多以對比之句述其主治文辭典雅表達透切須長則長可短則短視作用之多少而著筆能恰如其分且詞藻美妙如阿膠石膏等藥之敘述皆鏗鏘堪誦正文之後又加必要之註解並指出忌用之點使患者蒙其利而不受其害用心良苦書成遂風行一時問世不久上洋蔡嵋眉山氏仿其體例續作本草徵要補遺計五十八種清同治年間先六伯祖光奇公諱廷瑾又為重新分類意在便於翻檢且酌刪其劇毒之品以防初學之士掌握不善易出偏差並依臨症需要增入便用而易得之品若干顏曰刪補本草徵要供門徒抄讀光緒年間先君蕉麓公又續有增補晚清吳興凌奐字曉五著本草害利內容多采李氏原文民國初丁甘仁先生創上海中醫專門學校採此書作藥物之課本對李氏原文有為刪節者有作補充者易其名曰本草輯要丁氏又於其原書之後補撰本草續編增入八十餘種此外尚見許多無名之傳抄本有節略者有摘抄者有易書名者有改內容者因無刻本姑不詳述其足取者亦予採入此次整理以李氏明刊原本為主更採入蔡氏與先伯祖先君及丁氏所補切於實用者凡若干種並略插拙續於其中仍依光奇公原意釐為四卷第一卷為通治部分亦即多數為作用於全身者第二卷為形體部分與專科即分頭面七竅四肢百骸以及外科傷科女科兒科等第三卷依臟腑區分各從其類便於臨症時之參考第四卷為外治食療等等末附拙作澱粉類食療品談中藥的變通使用與煎藥用之水火備倉猝時之選擇本書羅列前人一脈相承之精粹言皆有徵雖有一定特點但由於匆促屬筆直行改橫行繁體改簡體難免有訛誤之處幸讀者加以指正繼續修訂當竢諸異日書名原依先伯祖意仍題刪補本草徵要乃遵李氏刪補頤生微論之例今易為重訂二字似更允當癸亥初冬揚州耿鑑庭識
