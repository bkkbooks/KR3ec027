body:
  text: 第三卷心經及小腸經一清心蓮心味苦性寒入心經清心去熱止血治遺渴者作茶快膈忘機蓮花瓣味苦甘鎮心益色駐顏輕身蓮花須味甘澀性溫無毒入心腎二經忌地黃蔥蒜清心而諸竅之出血可止固腎而丹田之精氣無遺鬚髮變黑顏駐情怡溫而不熱澀而不滯血家瀉家尊為上劑竹葉味苦甘性寒無毒入心胃二經清心滌煩熱止嗽化痰涎用捲心者尤良二怡悅心情萱花及葉又名宜男草味甘性平無毒入心經長於利水快膈令人歡樂忘憂金針菜主用亦同萱古作諼詩云焉得諼草即此種也諼忘也欲樹之以忘憂也萱葉可使人安寐用三莖煮水飲之有效改用金針菜葉亦有同效可連續用合歡皮及花一名夜合味甘性平無毒入心脾二經安和五臟歡樂忘憂心為君主之官土為萬物之母二臟調和則五臟自安神明自暢嵇康養生論云合歡蠲忿正謂此也榆莢附榆葉榆皮味微辛性平無毒入心脾二經榆令人愉使之多睡助肺健脾消食下氣和牛肉作羹療虛弱婦人帶下採子同造醬消心腹間之惡氣榆葉嫩葉作羹或炸食利小便能消浮腫棗仁等分蜜為丸治膽熱虛勞不眠又以之煎汁洗酒齄鼻有效榆白皮味甘性平滑利無毒荒年代谷暫使不飢因餓浮腫須雜糠粃利竅滲濕除邪和脾滑可去著通便甚宜三安神寧心蕨菜見食療遠志味苦辛性溫無毒入心腎二經畏珍珠藜蘆殺附子毒冷甘草湯浸透去水焙乾定心氣止驚益智補腎氣強志益精治皮膚中熱令耳目聰明療咳逆而愈傷中培不足以除邪氣心主鎮定則震撼無憂靈機善運故止驚益智水腑充盈則堅強稱職閉蟄封藏故強志益精水旺而皮熱可除心安而耳目自利遠志水火併補迨交坎離而成既濟者耶本功外治善療癰毒敷服皆奇苦以泄之辛以散之之力也酸棗仁味酸性平無毒入心脾肝膽四經惡防己炒熟酸收而心守其液乃固表虛有汗肝旺而血歸其經用療徹夜無眠膽怯者心主易動驚悸盜汗之所自來也肝虛者血不歸經則虛煩不眠之所自來也棗仁能補肝益膽則血得其養而諸證皆安矣肝膽二經有實邪熱者勿用以其收斂故也柏子仁味甘辛性平無毒入心肝腎三經畏菊花蒸曬炒安神定悸壯水強陽潤血而容顏美少補虛而耳目聰明心藏神腎藏精與志心腎虛則病驚悸入心養神入腎定志悸必愈矣悅顏聰明皆心血與腎水互相灌溉耳王好古謂柏實能潤肝柏子多油而滑作瀉者勿服多痰者亦忌有油透者勿入藥琥珀味甘性平無毒入心肺脾小腸四經安神而邪祟不侵清肺而小便自利新血止而瘀血消翳障除而光明覆感土木之氣而兼火化味甘色赤有艮止之義故能安神有下注之象故利小便而行血丹溪曰燥脾土有功脾能運化肺金下降小便自通若因血少而小便不利者反致燥急之苦滲利之性不利虛人凡陰虛內熱火炎水涸者勿服四止盜汗自汗龍骨及龍齒味甘性平無毒入心肝腎三經忌魚及鐵器畏石膏火煉水飛酒煮用養精神定魂魄澀精而遺泄能收固腸而崩淋可止縮小便止自汗生肌肉收脫肛龍齒鎮心安神定驚止痙龍骨多主肝病腎主骨故又益腎也許叔微云肝藏魂能變化魂飛不定者治之以龍齒龍骨收斂太過非久病虛脫者切勿妄投浮小麥味甘咸性涼入心經即水淘浮起者止虛汗盜汗解勞熱骨蒸益胃弱養心神秋種夏熟備受四時之氣但南方地暖下濕不如北產之良糯稻根味甘性平無毒入肺胃腎三經補肺生津健脾益胃退虛熱止盜汗養胃陰扶氣餒鮮根尤佳須於割稻後收集備用五鎮心辟邪硃砂味甘性寒有毒入心經惡磁石畏鹹水忌一切血水飛鎮心而定癲狂辟邪而除魔祟解胎熱痘毒療目痛牙疼色赤應離為心經主藥獨用多用令人呆悶金箔味辛性平有毒安鎮靈臺神魂免於飄蕩闢除惡祟臟腑搜其伏邪稟西方之質為五金之主最能制木故中風驚癇皆需之銀箔功用相仿金有大毒磨屑頓服不過三錢而斃豈可多服乎催生者用之紫石英味甘性溫無毒入心肝二經畏扁豆附子惡黃連火煅醋淬水飛上通君主鎮方寸之靡寧下達將軍助胎宮而有孕紫石英南方之色故功在血分火熱者忌之安息香味辛苦性平無毒入心經服之而行血下氣燒之而辟惡驅邪手少陰主藏神神昏則邪祟侵之心主血血滯則氣不宣快安神行血故主治如上病非關惡氣侵犯者勿用六開竅通神除惡蘇合香味甘性溫無毒入心脾二經開竅通神逐穢辟惡甘暖和脾鬱結凝留咸霧釋芬芳徹髓妖邪夢魘盡冰消沈括云蘇合油如黐膠以箸挑起懸絲不斷者真也蘇合香能開竅豁痰走真氣唯體氣壯實者宜之否則慎用龍腦香見外治麝香見外治七通小腸木通味辛甘淡性平無毒入心小腸二經色白而梗細者佳降心火出於小腸治五淋並宣九竅通血脈利關節清肺泄濕行經下乳功用雖多不出宣通氣血四字若君火為邪宜用木通相火為邪宜用澤瀉利水雖同用各有別木通性通利精滑氣弱內無濕熱妊娠者均忌燈心味淡性平無毒入心小腸二經清心必用利水偏宜燒灰吹喉症塗乳治夜啼中寒小便不禁者忌之淡竹葉味淡性寒無毒入小腸經專通小便兼解心煩淡味五臟無歸但入太陽利小便小便利則心火因之而清也淡竹葉有走無守不能益人孕婦禁服肺經及大腸經一治咳化痰前胡味苦性微寒無毒入肺脾胃大腸四經半夏為使惡皂莢畏藜蘆散結而消痰定喘下氣以消食安胎李時珍曰前胡主降與柴胡上升者不同氣降則痰亦降矣安胎化食無非下氣之力耳前胡去風痰與半夏治濕痰貝母治燥痰者各別也前胡治氣實風痰凡陰虛火動之痰及不因外感而有痰者法當禁之前胡又為散風之品故多用於感冒之初杏仁味苦甘性溫有毒入肺大腸二經惡黃芩黃耆葛根泡去皮尖焙雙仁者勿用散上焦之風除心下之熱利胸中氣逆而喘嗽潤大腸氣閉而難通解錫毒有效消狗肉如神杏仁性溫散肺經風寒滯氣殊效陰虛咳嗽者忌之雙仁者能殺人有毒蓋指此耳紫菀味苦辛性溫無毒入肺經款冬花為使惡遠志畏茵陳洗淨蜜水炒開泄肺郁宣通窒滯散結行瘀降逆止咳寒飲盤踞濁涎膠固痰喘上氣如水雞聲唾血溲少用之咸宜苦能下達辛可益金故吐血保肺收為上品雖入至高善於下趨使氣化及於州都而小便自利紫菀入血分款冬入氣分紫菀以化痰為主款冬以止咳為主款冬花味辛性溫無毒入肺經杏仁為使惡玄參畏貝母辛夷麻黃黃耆連翹甘草黃芩蜜水炒化痰則喘嗽無憂清肺則癰痿有賴雪積冰堅款花偏豔想見其純陽之稟故其主用皆辛溫開豁也卻不助火可以久任此藥溫而不燥乃溫潤之品急症喉風之嗆咳而氣息不平者可用射干麻黃湯減細辛治之久咳難止可用蜜拌款冬燃煙燻吸有效枇杷葉味苦性平無毒入肺胃二經刷去背上毛治胃病薑汁塗炙治肺病蜜水塗炙走陽明則止嘔下氣入太陰則定咳消痰長於降氣氣降則火清痰順但去毛不淨射入肺中作咳難療胃寒嘔吐及風寒咳嗽者忌之旋覆花一名金沸草味鹹甘性微溫無毒入肺大腸二經去蒂焙老痰堅硬結氣留飲風氣濕痹利腸通脈具宣行肺胃之功噫氣不除賴其辛散有斡旋胸中之力肝邪痹著藉以溫通咸能軟堅故能祛老痰結積風濕燥結之療溫能解散咸可潤下也丹溪云走散之藥虛者不宜多服冷利大腸虛寒人禁之百部味甘性微溫無毒入肺經肺寒咳嗽傳屍骨蒸殺蛔蟲寸白除蠅蝨蟯蚊與天門冬形相類而用相仿故名野天門冬但天門冬治肺熱此治肺寒為別也脾胃虛人須與補藥同用恐其傷胃氣又恐其滑腸也二潤肺天門冬味甘性寒無毒入肺腎二經地黃貝母為使忌鯉魚去心用定喘定嗽肺痿肺癰是潤燥之力也益精益髓消血消痰非補陰之力歟善殺三蟲能通二便甘寒養陰肺腎虛熱之要藥也天門冬性寒而滑若脾虛而泄瀉惡食者大非所宜即有前證亦勿輕投川貝母味辛苦性微寒無毒入心肺二經厚朴為使畏秦艽反烏頭去心糯米拌炒米熟為度消痰潤肺滌熱清心喘咳紅痰要矣心中鬱結神哉辛宜歸肺苦宜歸心大抵心清氣降肺賴以寧且潤而化痰故多功於西方也汪機曰俗以半夏燥而有毒代以貝母不知貝母治肺金燥痰半夏治脾土濕痰何可代也脾為濕土故喜燥肺為燥金故喜潤若痰在脾經誤用貝母之潤投以所惡反增病勢故寒痰濕痰風痰食積痰腎虛水泛為痰均非川貝所司也三止咳平喘白前味甘性平無毒入肺經甘草湯泡去須焙療喉間喘呼欲絕寬胸中氣滿難舒感秋之氣得土之味清肺有神喉中作水雞聲音服之立愈白前性無補益肺實邪壅者宜之否則忌也葶藶子味辛性寒無毒入肺經榆皮為使酒炒疏肺下氣喘逆安平消痰利水理脹通經耳中積水用之甚靈十劑云泄可去閉葶藶大黃之屬但性利不可混服有甜苦二種甜者力稍緩也桑根白皮味甘性寒無毒入肺經續斷桂心麻子為使刮去粗皮蜜水炙有涎出不可去也瀉肺金之有餘止喘定嗽疏小腸之閉滯逐水寬膨降氣散瘀血止渴消燥痰瀉肺降氣是其職專利便去水者兼瀉子之法也桑白皮瀉火肺虛無火因風寒而嗽者勿服桑椹子雖能補血脾胃虛滑者勿服馬兜鈴味苦性寒無毒入肺經焙清金有平咳之能滌痰有定喘之效體性輕揚有功於至高之臟根名青木香塗諸毒熱腫肺虛挾寒者畏之如螫四補肺平喘冬蟲夏草味甘性溫入肺腎二經補肺益腎止血化痰氣短喘咳可止已入虛損可還能健腰膝軟弱可轉憔悴之顏此物乃陰陽雙補之品性溫而潤既補肺陰又納腎陽益上焦之陰補下焦之陽乃虛損勞劫不可或少之品也蛤蚧味鹹性平入肺腎二經去眼頭足洗去鱗內不淨及肉毛酥炙或蜜炙或酒浸焙用補肺潤腎益精助陽治消渴而通淋療肺痿而定喘李瀕湖云補肺止渴效若人參扶羸益精功同羊肉嗽由風邪者不宜用五斂肺五倍子見外治六潤大腸降氣麻仁味甘性平無毒入脾胃大腸三經胃牡蠣白薇茯苓絹包置沸湯中至冷取出懸井中一夜勿著水曝乾新瓦上挼去殼潤五臟通大腸宣風利關節催生療產難滑利下行走而不守陳士良云多食損血脈滑精氣痿陽事婦人多食即髮帶疾栝蔞味苦性寒無毒入肺胃大腸三經胸中痹痛古有良方伍薤白白酒加半夏尤良傷寒誤下結胸則用小陷胸湯除上焦之熱使痰氣下降利咽喉通大腸此物能通大便與浙貝母同行其效更著小兒痰滯重者雖大便仍通加用於清化方中頗有良效栝蔞皮寬中利氣清熱化痰栝蔞仁潤燥滌痰滑腸通便郁李仁味酸性平無毒入脾大腸二經湯浸去皮研如膏潤達幽門而關格有轉輸之妙宣通水腑而腫脹無壅遏之嗟性專降下善導大腸燥結利周身水氣然下後令人津液虧損燥結愈甚乃治標救急之藥津液不足者慎勿輕服松子見食療萊菔子味辛性溫無毒入肺胃大腸三經下氣定喘消食除膨降濁通便以靖中宮生研堪吐風痰醋調能消毒腫丹溪云萊菔子治痰有推牆倒壁之功表其性烈也按虛弱人服之氣淺難布息七瀉下大黃味苦性寒有毒入脾胃肝大腸四經黃芩為使無所畏錦紋者佳沉降下行腸通胃滌瀉實熱之稽留破可攻之聚積黃疸瘀血腸癰痢疾慎而遣之其功無敵外塗可消癤腫制服能清血熱大黃雖有撥亂反正之功然峻利猛烈長驅直搗苟非血分熱結六脈沉實者切勿輕與推蕩朴硝味辛咸酸性寒無毒入胃大腸二經破血攻痰消食解熱法制玄明粉功緩力稍輕明目清燥推陳致新朴硝在下最粗而濁芒硝在上其質稍清玄明粉再經煎煉尤為精粹方士濫誇玄明粉去病延年不根之說也若施之於有虛無火之人及陰毒沉寒之證殺人慘於刀劍矣牽牛子味苦性寒有毒入肺大小腸三經酒蒸研細瀉肺行痰下氣除風陰囊水腫二便難通辛熱有毒之藥性又迅急主治多是肺脾之病多因虛起何賴瀉藥況諸症應用藥物神良者不少何至舍其萬全而就不可必之毒物哉東垣諄復其詞以戒後人勿用蓋目擊張子和旦暮用之故闢之甚力世俗不知取快一時後悔奚及孕婦忌用八清大腸白頭翁味苦性寒無毒入胃大腸二經得酒良熱痢溫瘧血痔疝瘕癭癧禿瘡鼻衄齒痛仲景治熱痢白頭翁湯加黃蘗黃連秦皮同用東垣云腎欲堅急食苦以堅之痢則下焦虛故以此純苦之劑堅之也按此物有風則靜無風則搖亦奇秦皮味苦澀性寒無毒入肝膽大腸三經惡吳茱萸清腸祛濕專治熱痢又醫目疾服洗咸宜此藥能收澀故帶下清稀者亦用之檳榔味辛性溫無毒入胃大腸二經忌見火降至高之氣似石投水疏後重之急如驥追風瘧疾與痰癖皆收腳氣與殺蟲並選足陽明為水穀之海手陽明為傳導之宮二經相為貫輸以運化精微者也二經病則痰積蟲癖生焉辛能破滯苦能殺蟲故主如上諸證檳榔墜諸氣至於下極氣虛下陷者所當遠避地榆味苦性寒無毒入肝大腸二經惡麥門冬止血利腸風除帶下五漏味苦而厚性沉而降善主下焦血證兼去濕熱地榆寒而下行凡虛寒作瀉氣虛下陷而崩帶者法並禁之槐花味苦酸性寒無毒入肝大腸二經含蕊而陳者佳微炒止便紅除血痢咸藉清腸之力療五痔明眼目皆資滌熱之功炒香頻嚼能治失音子名槐角用頗相同兼行血而降氣亦催生而墜胎感天地陰寒之氣而兼木與水之化故為涼血要品血不熱則陰自足目疾與痔證交愈矣按槐性純陰虛寒者禁用即虛熱而非實火者亦禁之刺蝟皮味苦性平入胃大腸二經炒用降逆定痛涼血止血反胃吐食腹疼不歇腸風痔漏脫肛肛裂五色痢疾疝氣陰蝕遺泄頻頻寒精自出鼻衄鼻息為末裹塞炒時須以滑石粉燙之配合胡黃連炮山甲槐米名胡連追毒丸治痔漏甚效扁豆花葉見食療九澀大腸石榴皮味酸澀性溫無毒入脾肺腎三經瀉痢久而腸虛崩帶多而欲脫水煎服而下蛔汁點目而止淚榴味酸澀故入斷下崩中之劑若服之太早反為害也橡斗子味苦性溫無毒入脾胃二經止瀉痢稱奇固精液頗效新痢起濕熱甚者忌服樗白皮俗稱臭椿味苦澀性寒有小毒東引者良以醋炙之澀血止瀉痢殺蟲收產腸苦寒之性虛寒者禁用腎家真陰虛者亦忌之以其徒燥耳止入丸用不入湯煎椿白皮即香椿主用相仿力稍遜之沒石子味苦性溫無毒入肺腎大腸三經忌銅鐵器用漿水於砂盆中研焙乾再研如鳥犀色固腸醫瀉利斂肺治咳血興陽事止遺泄外用能止牙疼能染鬚髮能治口瘡陰瘡能塗酒渣之鼻此藥有功於止澀然亦不宜獨用多用也赤石脂味酸辛性大溫無毒入心脾大腸三經畏芫花惡大黃松脂煅水飛久患腸澼頻頻脫肛生肌長肉外治癰瘍石脂固澀新痢家忌用脾經與胃經一健脾與溫脾消浮腫白朮見補氣蒼朮味苦辛性溫無毒入脾經畏惡同白朮產茅山者佳泔浸蒸曬燥濕消痰發汗解鬱除山嵐瘴氣弭災診惡疾蒼朮為濕家要劑痰與氣俱化辛溫快氣汗與郁並解芳氣辟邪得天地之正氣者歟蒼朮與白朮功用相似補中遜之燥性過之無濕者便不敢用況於燥證乎楮實味甘性寒無毒入脾經健脾消水腫益氣充肌膚楮實雖能消水健脾然脾胃虛寒者勿用大麥芒味甘性平入脾經水腫初起飲之可消雖藥味平常而奏功甚妙農村用之治浮腫有效蓋健脾行水之功也益智仁味辛性溫無毒入心脾腎三經去殼鹽水炒研細溫中進食補腎扶脾攝涎唾縮小便安心神止遺濁辛能開散使鬱結宣通行陽退陰之藥也古人進食必先益志為其於土中益火故耳益智功專補火如血燥有熱及因熱而遺濁者不可誤入也丁香味辛性溫無毒入肺胃腎三經忌見火畏鬱金去丁蓋雞舌香是其別名母丁香乃其大者溫脾胃而嘔呃可瘳理壅滯而脹滿宜療腹痛能止口臭堪去齒除疳䘌痘發白灰脾為倉廩之官傷於飲食生冷留而不去則為壅脹或為嘔呃暖脾胃而行滯氣則脹嘔俱瘳也丁香辛熱而燥非屬虛寒概勿施用蓽茇味辛性熱無毒入肺脾二經去挺醋浸一宿焙乾刮去皮粟子令淨溫脾除嘔逆定瀉理心疼鼻淵牙痛俱作外用古方用此百中之一以其辛熱耗散能動脾肺之火多用損目也二溫胃與健胃厚朴味苦辛性大溫無毒入脾胃二經乾薑為使惡澤瀉硝石寒水石忌豆色紫味辛者良刮去粗皮切片薑汁炒辛能散風邪溫可解寒氣下氣消痰去實滿而寬膨溫胃和中調胸腹而止痛吐利交資驚煩共主溫熱之性長於散結去滿溫胃暖脾故主食停痰滯脹痛吐利等證然但可施於元氣未虛邪氣方盛或客寒犯胃濕氣侵脾若脾虛之人雖有如上諸證切勿沾唇或一時未見其害而清純沖和之氣潛傷耗矣可不謹諸李東垣云苦能下氣故泄實滿溫能益氣故散實滿白豆蔻味辛性溫無毒入肺胃二經去衣微焙溫中除吐逆開胃消飲食瘧證宜投目翳莫缺味辛氣溫為寬中去滯之需翳膜遮睛亦滯氣也豆蔻辛溫火升作嘔因熱腹痛者禁之草豆蔻味辛性溫無毒入肺脾胃三經去膜微炒散寒止心腹之痛下氣驅逆滿之疴開胃而理霍亂吐瀉攻堅而破噎膈癥瘕辛能破滯香能達脾溫能散寒草豆蔻辛燥犯血忌陰不足者遠之肉豆蔻味辛性溫入胃大腸二經麵裹煨透去油忌鐵溫中消食止瀉止痢心疼腹痛闢穢殺蟲日華稱其下氣以脾得補而善運氣自下也非若陳皮香附之泄氣耳肉果性溫病人有火瀉痢初起皆不宜服縮砂仁味辛性溫無毒入肺脾胃大小腸腎六經炒去衣下氣而止咳嗽奔豚化食而理心疼嘔吐霍亂與瀉痢均資結滯與安胎並效芳香歸脾辛能潤腎為開脾胃之要藥和中氣之正品若腎虛氣不歸元非此嚮導不濟結滯需通胎喜疏利故咸主之砂仁性燥血虛火炎者不可過用孕婦食之太多耗氣必致難產三降逆和胃止痛竹茹味甘性微寒無毒入胃經又名竹二青刮去青皮用第二層疏逆氣而嘔呃與噎膈皆平清血熱而吐衄與崩中咸療竹種最多惟大而味甘者為勝必生長甫及一年者嫩而有力然久用能損氣刀豆子味甘性平無毒入胃腎二經溫中下氣益腎歸元利腸胃止呃逆刀豆止呃下氣歸元四字足以盡之娑羅子一名天師慄乃七葉樹之果實味甘性溫無毒入脾肺二經平胃通絡理氣寬中驅寒利膈醫疳治蟲脘腹脹滿胃寒作痛以此投之可以見功此子須搗碎煎服伏龍肝味辛性溫無毒咳逆反胃治之效燥濕消腫投之靈女人崩中帶下丈夫尿血遺精即灶心黃土去濕有專長代赭石味苦性寒入心包胃肝三經乾薑為使畏雄附煅紅酢淬水飛重可鎮虛逆止嘔痞噫氣寒能降虛陽平眩暈耳鳴吐衄崩中可用腸風下血稱靈傷寒論治汗吐下後心下痞鞭噫氣者用代赭旋覆湯傷寒蘊要以之與百合滑石同行治百合病復發普濟方用之煮汁飲治咽喉痛臨症用於有上阻之感者有效乃沉降之功也四健胃消化穀芽味甘苦性溫無毒消食與麥芽同等溫中乃谷蘖偏長味甘氣和具生化之性故為消食健脾開胃和中之要藥麥蘖味甘咸性溫無毒入胃經炒黃去芒留芽用熟腐五穀消導而無停運行三焦宣通而不滯療腹鳴與痰飲亦催生而墜胎以谷消穀有類從之義無推蕩之峻胃虛停穀食者宜之然有積化積無積消腎氣墜胎六曲味甘辛性溫無毒入胃經研細炒黃陳久者良健脾消穀食停腹痛無虞下氣行痰泄痢胃翻有藉暑期感冒用之表裡均和閃挫腰疼煅過淬酒溫服脾陰虛胃火盛者勿用能損胎孕肝膽二經一補肝兼補腎枸杞子味甘性微溫無毒入肝腎二經益肝以養營強筋明目補腎而填精止渴除煩精不足者補之以味枸杞子是也能使陰生則陰血自長肝開竅於目黑水神光屬腎二髒得補目自明矣枸杞能利大小腸故泄瀉者勿用二溫肝吳茱萸味辛性熱有小毒入肝脾胃三經蓼實為使惡丹參滑石畏紫石英開口者良鹽湯泡過焙乾燥腸胃而止久滑之瀉散陰寒而攻心腹之疼祛冷脹的獨得疏肝氣有偏長疝疼腳氣相宜開鬱殺蟲至效辛散燥熱獨入厥陰故能溫肝至於脾胃其旁及者也東垣云濁陰不降厥氣上逆甚而脹滿非茱萸不可治也多用損元氣寇氏曰下氣最速腸虛人服之愈甚凡病非寒滯者勿用即因寒滯者亦當酌量虛實適病為效也三斂肝烏梅味酸性平無毒入肺脾肝大腸四經定嗽定渴皆由斂肺之功止血止利盡是固腸之力清音去痰涎安蛔理煩熱蝕惡肉而至速消酒毒以清神白梅即霜梅也牙關緊閉擦齦涎出便能開刀箭傷膚研爛敷之血即止烏梅白梅皆以酸收為功疽愈後有肉突起烏梅燒敷一日減半兩日而平真奇方也夫梅生於春曲直作酸病有當發散者大忌酸收誤食必為害若過食而齒齼者嚼胡桃肉解之四舒肝木蝴蝶見喉科柴胡見和解五柔肝白芍見女科六涼肝羚羊角味鹹性寒無毒入肝經真達東方理熱毒而昏冒無虞專趨血海散瘀結而真陰有賴清心明目辟邪定驚濕風痢血宜加用瘰癧癰疽不可無羚羊角主在平肝息風清解熱毒肝虛而熱者宜之外有二十四節掛痕內有天生木胎此角須銼細避風搗篩用獨入厥陰能伐生生之氣青黛味鹹性寒無毒入肝經清肝火解鬱結幼稚驚疳大方吐血傷寒發斑瘡生口舌內服輕浮上達清火解毒外用有收水燥濕之功青黛性涼中寒者勿與蘆薈味苦性寒無毒入心肝脾三經善療五疳能殺三蟲主去熱明目理幼稚驚風肝火上炎耳鳴或聾稟陰寒之氣寒能除熱苦能泄熱故除熱殺蟲及明目也疳以濕熱為咎濕熱去則愈矣此藥清熱涼肝能瀉肝經實火直折火勢若頭暈頭痛耳鳴耳聾躁狂易怒屬陽亢實熱之象者與青黛梔子大黃等為伍可收速效蘆薈大苦大寒凡脾虛不思食者禁用七鎮肝熄風石決明味鹹性平無毒入肝腎二經鹽水煮水飛平肝潛陽息風止眩內服而障翳潛消外點而赤膜盡散七孔九孔者良十孔者不佳久服令人寒中蜈蚣味辛性溫有毒入肝經畏蜘蛛蜒蚰雞屎桑皮鹽搜風息風止痙定搐散腫行瘀走串攻毒口眼喎斜惡瘡頭禿破傷臍風積聚在腹使用此物須藥病相當不可過劑全蠍味辛性平有毒入肝經善逐肝風深透筋骨中風恆收驚癇亦簡諸風掉眩皆屬肝木蠍屬木色青獨入厥陰為風家要藥全用者謂之全蠍但用尾謂之蠍梢其力尤緊似中風和小兒慢脾風屬於虛者法咸禁之八伐肝瀉膽青皮即橘之小者麩炒破滯氣愈低愈效削堅積愈下愈良引諸藥至厥陰之分下飲食入太陰之倉青皮伐肝兼能發汗性頗猛銳不宜多用如人年少壯未免躁暴及長大而為橘皮如人至老年烈性漸減經久而為陳皮則多歷寒暑而躁氣全消也九清肝膽火龍膽草見耳科腎與膀胱經一補腎陽補骨脂味辛性溫無毒入腎經惡甘草忌羊肉諸血胡桃拌炒一名破故紙興陽事止腎泄固精氣止腰疼肺寒咳嗽無虞腎虛喘息宜用暖則水藏壯火益土之要藥也補骨性燥凡陰虛有熱大便閉結者戒之肉蓯蓉味甘咸性溫無毒入腎經酒洗去甲益精壯陽事補傷潤大腸男子血瀝遺精女子陰疼帶下滋腎補精之首藥亦溫潤之首藥但須大至斤許不腐者佳溫而下熱潤而不燥補而不驟故有蓯容之名別名黑司命亦多其功力之意云巫蓉性滑泄瀉及陽易舉而精不固者忌之鎖陽味甘咸性溫無毒入腎經強陰補筋潤腸壯骨鎖陽功用與蓯蓉相仿禁忌亦同亦溫潤之藥也淫羊藿味辛性溫無毒入腎經山藥為使得酒良用羊油拌炒強筋骨起陽事衰利小便除莖中痛補命門之真火愈四肢之不仁陶弘景雲服之好為陰陽別名仙靈脾千兩金棄杖草皆矜其功力也淫羊藿補火相火易動者遠之仙茅味辛性溫有小毒入腎經忌鐵器禁牛乳糯米泔浸一宿去赤汁則毒去助陽填骨髓心腹寒疼開胃消宿食強記通神補而能宣西域僧獻於唐玄宗大有功力遂名婆羅門參廣西英州多仙茅羊食之遍體化為筋人食之大補其消食者助少火以生土土得干健之運也其強記者腎氣時上交於南離故也仙茅專於補火惟精寒者宜之火熾者有暴絕之戒巴戟天味甘性溫無毒入腎經覆盆子為使畏丹參酒浸焙安五臟以益精強筋骨而起陰補助元陽則腎氣滋長諸病自息陰虛相火熾者不宜用二固攝腎氣沙苑蒺藜味甘性溫無毒入腎經酒炒補腎止遺強陰益精目昏腰痛帶下尿頻沙苑蒺藜市多雜品須狀如腎子帶綠色咬之作生豆氣者真菟絲子味辛甘性平無毒入腎經山藥為使酒煮令吐絲打作餅烘乾再研即成細末續絕傷益氣力強陰莖堅筋骨溺有餘瀝寒精自出口苦燥渴寒血為積雷公云稟中和之性凝正陽之氣腎臟得力則絕傷諸症愈矣主口苦燥渴者水虛則內熱津枯辛以潤之二證俱安也菟絲子助火強陽不痿者忌之金櫻子味酸澀性平無毒入脾腎二經扃鑰元精合閉蟄封藏之本牢拴倉廩贊傳導變化之權金櫻子性澀不利於氣丹溪云經絡墜道以通暢為和平昧者喜其澀精而服之致生別證自不作靖咎將誰執雖然無故而服以縱欲則不可若精滑者服之何咎之有覆盆子味甘性平無毒入肝腎二經去蒂酒蒸固精攝溺益下封藏強陰美顏色補虛續絕傷能益閉蟄封藏之本以縮小便服之當覆其溺器故名覆盆子固澀小便不利者禁之牡蠣附蛤粉味鹹微澀性微寒無毒入肝腎二經貝母為使惡麻黃辛夷吳茱萸火煅童便淬之固精澀二便止汗免崩淋消胸中之煩滿化痰凝之瘰癧愈婦人帶下治虛勞煩熱傷寒而寒熱宜求溫瘧與驚恚莫缺蛤粉蛤蜊殼煅為粉用粉與牡蠣同功肉則止渴解酒牡蠣蛤蜊俱出海中大抵海物鹹寒故功用相仿江湖蛤蚌無鹽水浸漬但能清熱利濕不能軟堅虛而熱者宜之有寒者禁與桑螵蛸味鹹性平無毒入腎經畏旋覆花蒸透再焙起陽事而痿弱何憂益精氣而育麟可冀即螳螂之子必以桑樹上者為佳也三利水滲濕清膀胱茯苓味甘淡性平無毒入心腎脾胃小腸五經馬藺為使畏牡蒙地榆秦艽龜甲忌醋產雲南色白而堅實者佳去皮膜用益脾胃而利小便水濕都消止嘔吐而定泄瀉氣機咸利下行伐腎水泛之痰隨降中守鎮心憂驚之氣難侵保肺定咳嗽安胎止消渴抱根者為茯神主用俱同而安神獨掌紅者為赤茯苓功力稍遜而利水偏長茯苓假松之餘氣而成無中生有得坤厚之精為脾家要藥素問曰飲入於胃遊溢精氣上輸於肺通調水道下輸膀胱則利水之藥皆上行而後下降也故潔古謂其上升東垣謂其下降各不相背也按小便多其源亦異素問云肺氣盛則便數虛則小便遺心虛則少氣遺溺下焦虛則遺溺胞絡遺熱於膀胱則遺溺膀胱不約為遺溺厥陰病則遺溺所謂肺氣盛者實熱也宜茯苓以滲其熱故曰小便多者能止也若肺虛心虛胞絡熱厥陰病皆虛熱也必上熱下寒法當升陽膀胱不約下焦虛者乃火投於水水泉不藏必肢冷脈遲法當用溫熱之藥皆非茯苓可治故曰陰虛者不宜用也茯神抱根而生有依守之義故魂不守舍者用以安神赤者入丙丁但主導赤而已病人小便不禁虛寒精滑者皆不得服豬苓味甘淡性平無毒入腎膀胱二經去皮分消水腫淡滲濕痰豬苓感楓根之餘氣而成利水諸藥無如此訣寇宗奭曰多服豬苓損腎昏目潔古云淡滲亡津液無濕證者勿服澤瀉味甘咸性微寒無毒入腎膀胱二經畏文蛤去皮酒潤焙利水泄熱滲濕通淋若與白朮配合滌飲平眩甚妙伍於六味之中補瀉相輔而行李時珍曰澤瀉利水泄下脾胃有濕熱則頭重而目昏耳鳴澤瀉滲去其濕則熱亦隨去而土氣得令清氣上行使人明爽故有治頭眩聰明耳目之功若久服則降令太過清氣不升真陰潛耗安得不目昏耶澤瀉善瀉古稱補虛者誤矣扁鵲謂其害眼者確也病人無濕腎虛精滑目虛不明切勿輕與茵陳味苦性寒無毒入脾胃肝膽膀胱五經理黃疸而除濕熱佐五苓而利小腸茵陳去濕熱獨宜於五疸然亦須五苓之類佐助成功濕熱上干口舌生瘡甘露飲中用之後世普治暑濕內蘊時毒項腫等之甘露消毒丹中亦用之用茵陳者中病即已若過用之元氣受賊黃櫨味苦性寒無毒入肝膽膀胱三經解煩熱除黃疸塗漆瘡洗赤眼即北京香山紅葉也清利濕熱兼能解毒故主用如上滑石味甘淡性寒無毒入胃膀胱二經利小便行積滯宣九竅之閉通六腑之結滑石利竅不獨小便也上能利毛竅下能利精竅蓋甘淡先入胃家上輸於肺下通膀胱肺主皮毛為水上源膀胱司津液氣化則能出故上則發表下則利水為蕩熱燥濕之劑與甘草為伍名六一散能利水瀉火解暑除煩再入硃砂名益元散可以清心多服使人精滑脾虛下陷者禁之通草味甘淡性寒無毒入肺胃膀胱三經瀉肺利水引熱下行通氣滲濕來乳催生通草之花上粉外治痔瘻惡瘡納之多效蘇頌謂其療胸中伏氣攻胃咽咽喉不利如存異物者用之亦有效惜藥肆不備車前子味甘性寒無毒入肝腎小腸三經酒拌蒸曝利水止瀉解熱催生益精明目開竅通淋用其莖葉行血多靈濕熱瘡癢用之安寧利水之品乃云益精何也男女陰中各有二竅一竅通精乃命門真陽之火一竅通水乃膀胱濕熱之水二竅不並開水竅開則濕熱外泄相火常寧精竅常閉久久精足精足則目明陽氣下陷腎氣虛脫勿入車前多用久用滲利太過反致傷津冬葵子味甘性寒無毒入膀胱經能催生通乳疏便閉諸淋氣味俱薄淡滑為陽故能利竅冬葵乃滑利之品滑可去著故能治如上諸症但無故服用必有損真之害葫蘆味甘性平無毒入脾腎二經能利水消腫治面浮腹大陳瓢亦與之同功萆薢味苦性平無毒入肝腎膀胱三經薏苡為使惡葵根大黃柴胡前胡祛風而通經絡利濕而分清濁主風寒濕痹腰膝作疼五淋惡瘡莖中刺痛既可去膀胱宿水又能止失溺便頻萆薢本除風濕如陰虛火熾溺有餘瀝及無濕而腎虛腰痛皆禁瞿麥味苦性寒無毒入膀胱經利水破血出刺墮胎消腫決癰明目去翳降心火利小腸疏癃結而治淋逐膀胱之邪熱八正散用為利小便之主藥若心雖熱而小腸虛者忌服恐心熱未除而小腸復病矣去刺者拔肉刺也萹蓄味苦性平無毒入膀胱經利水治癃淋殺蟲理瘡疾治癃及瘡皆去濕熱也萹蓄直逐不能益人不宜恆用石韋味甘苦性微寒無毒入肺膀胱二經杏仁滑石射干為使清肺金以資化源通膀胱而利水道面浮腰痠溲渾極宜用也肺熱咳嗽躁煩亦可投之本藥多與車前或滑石為伍其效更著海金沙味甘性寒無毒入小腸膀胱二經除濕熱消腫滿清血分利水道產於黔中及河南收曝日中小干以紙襯之以杖擊之有細沙落紙上且曝且擊以淨為度性不狼戾惟熱在太陽經血分者宜之玉米鬚味甘性平無毒利水消浮腫熏煙治鼻淵此物尚有平肝止血等作用乃廢物利用無害之良藥也蠶沙味甘辛性溫入脾胃肝三經去風燥濕經絡宣通導胃腸濕濁治關節痹痛既可內服又作熨用治霍亂之蠶矢湯治濕熱痹之宣痹湯皆有效之名方也螻蛄味鹹性寒無毒去翅足炒入大小腸膀胱三經通便而二陰皆利逐水而十種俱平貼癢燥頗效化骨哽殊靈螻蛄自腰以前其澀能止二便自腰以後其利能通二便治水甚效但其性猛虛人戒之石燕味甘性涼無毒入肝腎膀胱三經利竅行濕熱明目治淋瀝婦人帶下小兒疳積能牢牙止痛治氣阻咽嗌或磨汁而飲一枚用三日或為末水飛一錢末飲服或火煅醋淬硃砂紅曲同為散或搗如黍米桑根白皮共煎液或蜜調其粉塗唇便用於小兒或細末蔥白湯調治傷寒尿澀石燕乃古代生物化石藥源甚廣孕婦忌用揚州鎮江等地用以磨汁治咽喉有阻窒之感者多顯效附紅燕丹方見醫宗說約大石燕一對火煅醋淬九次研細末硃砂三錢另研水飛紅曲一兩洗淨共研極細末每服三分糖拌開水沖服此方消疳化積有握拳努掙現象者尤宜且無藥氣利於小兒之畏藥者蔣示吉先生並附親歷之醫案一則云予表侄二三歲間患疳積症頭大身瘦發熱溺如米泔諸藥不效後聞藥氣即吐束手無策偶遇異人傳此方和於糖果粥飯中與之竟痊愈後以此濟人無不效其餘用法之主症請參閱本草綱目四治疝懷茴香味辛性溫無毒入胃腎二經主腹疼疝氣平霍亂吐逆辛香宜胃溫性宜腎故其主治不越二經懷香辛溫若陽道數舉得熱則吐者均戒八角者名大茴香小如粟米者力薄葫蘆巴味苦性熱無毒入腎膀胱二經淘淨酒焙元臟虛寒膀胱疝氣寒濕成疝肝疾也元臟暖則筋自和而疝愈此腎肝同治乙癸同源之理也相火熾盛陰血虧少者禁之橘核味苦性溫無毒入肝腎二經理氣止痛治睪丸脹痛除乳腫腰疼實症為宜虛人不宜多用荔枝核味甘性溫燒存性散滯氣闢寒邪睪腫消狐疝回胃脘痛婦人血氣痛用五錢香附一兩末之每服二錢鹽湯或米飲下名蠲痛散㿗疝卵腫酒調一味服又殼發痘瘡心胞與三焦經一去心胞火牡丹花瓣見咽喉科二瀉心胞積熱紫葳花味酸性寒無毒入心胞肝二經畏滷鹼三焦血瘀二便燥干即凌霄花也乃手足厥陰血分藥能去血中伏火及血熱生風之證又一陰一陽結之急症關下喉痹便秘者與烏扇浙貝連翹等為伍其效頗著紫葳酸寒不能益人走而不守虛人避之三瀉三焦火梔子花瓣見咽喉科
